---
name: "Update Results Ledger"
description: "Parses test results, computes binary SHA, and updates the _metadata/badges branch"
inputs:
  pass_count:
    required: true
  fail_count:
    required: true
  skip_count:
    required: true
  results_file:
    default: "tests/test_results/complement/test_results.jsonl"
  version_string:
    required: true
  actor:
    required: true
  binary_path:
    description: "Path to the tested binary"
    default: "target/debug/conduwuit"
  features:
    description: "Space-separated list of cargo features used for this build"
    default: ""

runs:
  using: "composite"
  steps:
    - name: Process and push results
      shell: bash
      run: |
        JSONL="${{ inputs.results_file }}"
        if [ ! -f "$JSONL" ]; then echo "FATAL: No test results found."; exit 0; fi

        # Setup environment
        PASS="${{ inputs.pass_count }}"
        FAIL="${{ inputs.fail_count }}"
        SKIP="${{ inputs.skip_count }}"
        VERSION_STRING="${{ inputs.version_string }}"
        ACTOR="${{ inputs.actor }}"
        BINARY_PATH="${{ inputs.binary_path }}"
        FEATURES="${{ inputs.features }}"
        # Attempt to extract commit hash from the binary version string
        BIN_VER_HASH=$(echo "$VERSION_STRING" | sed -n 's/.*~\([0-9a-f]\{7,\}\).*/\1/p')
        COMMIT_HASH="${BIN_VER_HASH:-${GITHUB_SHA:-unknown}}"
        RUN_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        RUN_ID="${COMMIT_HASH}-${RUN_DATE}"
        PROVIDER=$([ -n "$FORGEJO_URL" ] && echo "forgejo" || echo "github")
        BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/} || echo "main")
        [ -z "$BRANCH_NAME" ] && BRANCH_NAME="main"

        # SHA256 calculation
        BIN_SHA="unknown"
        [ -f "$BINARY_PATH" ] && BIN_SHA=$(sha256sum "$BINARY_PATH" | awk '{print $1}')

        # Prepare workspace in /tmp to survive branch swap
        cp "$JSONL" /tmp/run.jsonl
        cp .forgejo/actions/update-results-ledger/{tables.sql,import.py,Makefile} /tmp/

        # Switch to metadata branch
        git config --global user.name "CI Runner"
        git config --global user.email "runner@ci.local"
        git fetch origin _metadata/badges || true
        git checkout _metadata/badges || git checkout --orphan _metadata/badges
        git rm -rf . || true

        # Restore helpers and data
        cp /tmp/{tables.sql,import.py,Makefile} .
        echo "ledger.db" > .gitignore
        [ ! -f runs.jsonl ] && touch runs.jsonl
        [ ! -f run_details.jsonl ] && touch run_details.jsonl

        # Append data
        jq -n -c --arg run_id "$RUN_ID" --arg run_date "$RUN_DATE" --arg commit_hash "$COMMIT_HASH" \
          --arg branch "$BRANCH_NAME" --arg author_name "$ACTOR" --arg provider "$PROVIDER" \
          --arg binary_sha256 "$BIN_SHA" --arg version_string "$VERSION_STRING" \
          --arg features "$FEATURES" \
          --arg pass "$PASS" --arg skip "$SKIP" --arg fail "$FAIL" \
          '{version_string: $version_string, binary_sha256: $binary_sha256, run_id: $run_id, run_date: $run_date, commit_hash: $commit_hash, branch: $branch, author_name: $author_name, provider: $provider, features: $features, passed_count: ($pass|tonumber), skipped_count: ($skip|tonumber), failed_count: ($fail|tonumber)}' >> runs.jsonl

        jq -c --arg version_string "$VERSION_STRING" --arg run_id "$RUN_ID" '. + {version_string: $version_string, run_id: $run_id}' /tmp/run.jsonl >> run_details.jsonl

        # Import and generate badges
        make import
        COLOR="green"; [ "$SKIP" -gt 0 ] && COLOR="yellow"; [ "$FAIL" -gt 0 ] && COLOR="red"
        mkdir -p "badges/$PROVIDER/commits"
        BADGE=$(jq -n --arg pass "$PASS" --arg skip "$SKIP" --arg fail "$FAIL" --arg color "$COLOR" \
          '{schemaVersion: 1, label: "Complement Tests", message: "$pass pass, $skip skip, $fail fail", color: $color}')
        echo "$BADGE" > "badges/$PROVIDER/badge-${BRANCH_NAME}.json"
        echo "$BADGE" > "badges/$PROVIDER/commits/${COMMIT_HASH}.json"

        # Commit and Push (with retry for concurrent builds)
        git add .
        if git commit -m "Add test results for ${COMMIT_HASH} [skip ci]"; then
          MAX_RETRIES=5
          RETRY_COUNT=0
          until git push origin HEAD:_metadata/badges; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ "$RETRY_COUNT" -ge "$MAX_RETRIES" ]; then
              echo "Failed to push after $MAX_RETRIES attempts."
              exit 1
            fi
            echo "Push failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
            # Random sleep between 1 and 5 seconds to avoid thundering herd
            sleep $(( (RANDOM % 5) + 1 ))
            # Fetch and rebase to integrate changes from other concurrent runners
            git pull --rebase origin _metadata/badges
          done
        fi
