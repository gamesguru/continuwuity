name: "Update Results Ledger"
description: "Parses test results, computes binary SHA, and updates the _metadata/badges branch"
inputs:
  github_token:
    description: "Token for pushing to the repository"
    required: true
  pass_count:
    required: true
  fail_count:
    required: true
  skip_count:
    required: true
  results_file:
    default: "tests/test_results/complement/test_results.jsonl"
  version_string:
    required: true
  actor:
    required: true
  binary_path:
    description: "Path to the tested binary"
    default: "target/debug/conduwuit"

runs:
  using: "composite"
  steps:
    - name: Process and push results
      shell: bash
      run: |
        JSONL="${{ inputs.results_file }}"
        if [ ! -f "$JSONL" ]; then echo "⚠️ No test results found."; exit 0; fi

        PASS="${{ inputs.pass_count }}"
        FAIL="${{ inputs.fail_count }}"
        SKIP="${{ inputs.skip_count }}"
        VERSION_STRING="${{ inputs.version_string }}"
        ACTOR="${{ inputs.actor }}"
        BINARY_PATH="${{ inputs.binary_path }}"

        # Compute SHA256
        if [ -f "$BINARY_PATH" ]; then
          BIN_SHA=$(sha256sum "$BINARY_PATH" | awk '{print $1}')
        else
          BIN_SHA="unknown"
        fi

        PROVIDER=$([ -n "$FORGEJO_URL" ] && echo "forgejo" || echo "github")
        OS_INFO=$(lsb_release -ds 2>/dev/null || echo "Unknown OS")
        HOST_INFO="$OS_INFO ($(hostname))"

        BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/} || echo "main")
        if [ -z "$BRANCH_NAME" ]; then BRANCH_NAME="main"; fi
        COMMIT_HASH="${GITHUB_SHA:-unknown}"
        RUN_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        RUN_ID="${COMMIT_HASH}-${RUN_DATE}"

        # Copy the test file to a safe place
        cp "$JSONL" /tmp/current_run.jsonl
        # Copy helper scripts
        cp .forgejo/actions/update-results-ledger/tables.sql /tmp/tables.sql
        cp .forgejo/actions/update-results-ledger/import.py /tmp/import.py
        cp .forgejo/actions/update-results-ledger/Makefile /tmp/Makefile

        git config --global user.name "CI Runner"
        git config --global user.email "runner@ci.local"

        # Set URL to HTTPS so we don't hang on SSH prompts in the runner
        git remote set-url origin https://${{ inputs.github_token }}@forgejo.ellis.link/gamesguru/continuwuity.git || true

        git fetch origin _metadata/badges || true
        git checkout _metadata/badges

        # Restore helpers into the branch
        cp /tmp/tables.sql .
        cp /tmp/import.py .
        cp /tmp/Makefile .

        # Ensure we never commit the DB
        echo "ledger.db" >> .gitignore

        if [ ! -f runs.jsonl ]; then touch runs.jsonl; fi
        if [ ! -f run_details.jsonl ]; then touch run_details.jsonl; fi

        # Append new run info to JSONL
        jq -n -c \
          --arg run_id "$RUN_ID" --arg run_date "$RUN_DATE" --arg commit_hash "$COMMIT_HASH" \
          --arg branch "$BRANCH_NAME" --arg author_name "$ACTOR" --arg provider "$PROVIDER" \
          --arg host_info "$HOST_INFO" --arg binary_sha256 "$BIN_SHA" \
          --arg version_string "$VERSION_STRING" \
          --arg pass "$PASS" --arg skip "$SKIP" --arg fail "$FAIL" \
          '{run_id: $run_id, run_date: $run_date, commit_hash: $commit_hash, branch: $branch, author_name: $author_name, provider: $provider, host_info: $host_info, binary_sha256: $binary_sha256, version_string: $version_string, passed_count: ($pass|tonumber), skipped_count: ($skip|tonumber), failed_count: ($fail|tonumber)}' >> runs.jsonl

        # Append all test events
        jq -c --arg run_id "$RUN_ID" '. + {run_id: $run_id}' /tmp/current_run.jsonl >> run_details.jsonl

        # Verify SQL import works
        make import

        # Generate badges
        if [ "$FAIL" -gt 0 ]; then COLOR="red"; elif [ "$SKIP" -gt 0 ]; then COLOR="yellow"; else COLOR="green"; fi
        mkdir -p "badges/$PROVIDER"
        jq -n --arg pass "$PASS" --arg skip "$SKIP" --arg fail "$FAIL" --arg color "$COLOR" \
          '{schemaVersion: 1, label: "Complement Tests", message: "\($pass) pass, \($skip) skip, \($fail) fail", color: $color}' > "badges/$PROVIDER/badge-${BRANCH_NAME}.json"

        git add .gitignore tables.sql Makefile import.py runs.jsonl run_details.jsonl badges/
        if git commit -m "Add test results for ${COMMIT_HASH} [skip ci]"; then
          # Retry loop for concurrent pushes
          max_retries=5
          count=0
          while [ $count -lt $max_retries ]; do
            if git push origin HEAD:_metadata/badges; then
              echo "Successfully pushed ledger updates."
              break
            else
              echo "Push failed due to remote changes. Pulling with rebase and retrying..."
              # Create a tracking branch so pull works correctly
              git branch -f _metadata/badges HEAD
              git checkout _metadata/badges
              # Pull remote changes securely
              git pull --rebase origin _metadata/badges
              count=$((count + 1))
            fi
          done

          if [ $count -eq $max_retries ]; then
            echo "Failed to push ledger updates after $max_retries attempts due to heavy concurrency."
            exit 1
          fi
        else
          echo "Nothing to commit."
        fi
