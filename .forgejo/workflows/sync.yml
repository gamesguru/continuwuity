name: Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: heliohost-sync
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "forgejo-actions[bot]"
          git config user.email "forgejo-actions@noreply.localhost"
          git config checkout.defaultRemote origin
          git remote add github https://github.com/gamesguru/continuwuity.git

      - name: Sync main
        run: |
          if git fetch github main; then
            git checkout -B main origin/main
            git merge FETCH_HEAD --no-edit || exit 1
            git push origin main
          else
            echo "Failed to fetch GitHub main."
            exit 1
          fi

      - name: Sync dev
        run: |
          if git fetch github dev; then
            git checkout -B dev origin/dev
            git merge FETCH_HEAD --no-edit || exit 1
            git push origin dev
          else
            echo "Failed to fetch GitHub dev."
            exit 1
          fi

      - name: Sync metadata
        run: |
          if git fetch github _metadata/badges; then
            if ! git show-ref --verify --quiet refs/heads/_metadata/badges; then
              git checkout -b _metadata/badges FETCH_HEAD
            else
              git checkout -B _metadata/badges origin/_metadata/badges
              git merge FETCH_HEAD --no-edit || exit 1
            fi
            git push origin _metadata/badges
          else
            echo "GitHub _metadata/badges not found, skipping."
          fi
