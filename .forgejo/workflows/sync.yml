name: Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: heliohost-sync
    steps:
      - name: Slim Checkout
        shell: bash
        run: |
          git clone --depth 1 ${{ github.server_url }}/${{ github.repository }}.git .
          git fetch --unshallow || true

      - name: Configure Git
        env:
          TOKEN: ${{ secrets.FORGEJO_TOKEN || github.token }}
        run: |
          git config user.name "continuwuity CI"
          git config user.email "noreply@continuwuity.org"
          git config checkout.defaultRemote origin
          git config commit.gpgsign true

          # Ensure origin uses the token for pushing back to Forgejo
          SERVER_URL="${{ github.server_url }}"
          HOST="${SERVER_URL#https://}"
          git remote set-url origin https://x-access-token:$TOKEN@$HOST/${{ github.repository }}.git

          git remote add github https://github.com/gamesguru/continuwuity.git

      - name: Sync main
        run: |
          echo "::group::Sync main"
          echo "Fetching from github..."
          if git fetch github main; then
            echo "Fetching from origin..."
            git fetch origin main || true
            if git show-ref --verify --quiet refs/remotes/origin/main; then
              echo "Checking out main..."
              git checkout -B main origin/main
              echo "Merging..."
              MERGE_OUTPUT=$(git merge FETCH_HEAD --no-edit)
              echo "$MERGE_OUTPUT"
              if [[ "$MERGE_OUTPUT" != "Already up to date." ]]; then
                echo "Pushing..."
                git push origin main --no-verify
              else
                echo "No changes to push."
              fi
            else
              echo "Creating main..."
              git checkout -b main FETCH_HEAD
              git push origin main --no-verify
            fi
            echo "Done."
          else
            echo "Failed to fetch GitHub main."
            exit 1
          fi
          echo "::endgroup::"

      - name: Sync dev
        run: |
          echo "::group::Sync dev"
          echo "Fetching from github..."
          if git fetch github dev; then
            echo "Fetching from origin..."
            git fetch origin dev || true
            if git show-ref --verify --quiet refs/remotes/origin/dev; then
              echo "Checking out dev..."
              git checkout -B dev origin/dev
              echo "Merging..."
              MERGE_OUTPUT=$(git merge FETCH_HEAD --no-edit)
              echo "$MERGE_OUTPUT"
              if [[ "$MERGE_OUTPUT" != "Already up to date." ]]; then
                echo "Pushing..."
                git push origin dev --no-verify
              else
                echo "No changes to push."
              fi
            else
              echo "Creating dev..."
              git checkout -b dev FETCH_HEAD
              git push origin dev --no-verify
            fi
            echo "Done."
          else
            echo "Failed to fetch GitHub dev."
            exit 1
          fi
          echo "::endgroup::"

      - name: Sync metadata
        run: |
          echo "::group::Sync metadata"
          echo "Fetching from github..."
          if git fetch github _metadata/badges; then
            echo "Fetching from origin..."
            git fetch origin _metadata/badges || true
            if git show-ref --verify --quiet refs/remotes/origin/_metadata/badges; then
              echo "Checking out metadata..."
              git checkout -B _metadata/badges origin/_metadata/badges
              echo "Merging..."
              MERGE_OUTPUT=$(git merge FETCH_HEAD --no-edit --allow-unrelated-histories)
              echo "$MERGE_OUTPUT"
              if [[ "$MERGE_OUTPUT" != "Already up to date." ]]; then
                echo "Pushing..."
                git push origin _metadata/badges --no-verify
              else
                echo "No changes to push."
              fi
            else
              echo "Creating metadata..."
              git checkout -b _metadata/badges FETCH_HEAD
              git push origin _metadata/badges --no-verify
            fi
            echo "Done."
          else
            echo "GitHub _metadata/badges not found, skipping."
          fi
          echo "::endgroup::"
