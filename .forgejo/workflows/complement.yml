---
name: Complement Tests

on:
  workflow_dispatch:
    inputs:
      artifact_url:
        description: "URL to the conduwuit artifact (binary or zip)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SKIP_CONFIRM: 1
  # Absolute paths for Rust tools on the host VPS
  CARGO: /opt/rust/cargo/bin/cargo
  RUSTUP: /opt/rust/cargo/bin/rustup
  PATH: /opt/rust/cargo/bin:/home/forgejo-runner/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  complement-tests:
    runs-on: ubuntu-22.04-avx512

    env:
      RUSTC_WRAPPER: ccache
      PROFILE: release

    steps:
      - name: Slim Checkout
        run: |
          # Use raw git to avoid Node-based checkout action
          if [ ! -d ".git" ]; then
            git init
            git remote add origin ${{ forge.server_url }}/${{ forge.repository }}
          fi
          git fetch --depth 1 origin ${{ forge.sha }}
          git checkout FETCH_HEAD
          git fetch --tags --force

      - name: Download conduwuit bundle
        run: |
          ARTIFACT_URL="${{ github.event.inputs.artifact_url }}"

          # If the user pasted a github.com web UI URL, convert it to the API endpoint
          if [[ "$ARTIFACT_URL" =~ ^https://github\.com/([^/]+)/([^/]+)/(suites|actions/runs)/[^/]+/artifacts/([^/]+) ]]; then
            OWNER="${BASH_REMATCH[1]}"
            REPO="${BASH_REMATCH[2]}"
            ARTIFACT_ID="${BASH_REMATCH[4]}"
            ARTIFACT_URL="https://api.github.com/repos/$OWNER/$REPO/actions/artifacts/$ARTIFACT_ID/zip"
            echo "Converted Web URL to API URL: $ARTIFACT_URL"
          fi

          mkdir -p target/${{ env.PROFILE }}
          echo "Downloading bundle from: $ARTIFACT_URL"
          curl -L -o target/${{ env.PROFILE }}/bundle.zip -H "Authorization: Bearer ${{ secrets.C10Y_GITHUB_TOKEN }}" "$ARTIFACT_URL"

      - name: SHA256 sum check (zip bundle verification)
        run: |
          # Log SHA256 of the bundle
          sha256sum target/${{ env.PROFILE }}/bundle.zip

      - name: Extract conduwuit bundle
        run: |
          echo "Unzipping bundle..."
          unzip -o target/${{ env.PROFILE }}/bundle.zip -d target/${{ env.PROFILE }}/
          rm target/${{ env.PROFILE }}/bundle.zip
          chmod +x target/${{ env.PROFILE }}/conduwuit

      - name: GPG signature check (binary verification)
        run: |
          echo "Verifying GPG signature..."
          echo "${{ secrets.C10Y_BINARY_RELEASE_GPG_PUBLIC_KEY }}" | gpg --batch --import
          gpg --batch --verify target/${{ env.PROFILE }}/conduwuit.asc target/${{ env.PROFILE }}/conduwuit
          echo "OK. GPG signature verified."


      - name: Post-verification setup
        run: |
          mkdir -p target/latest
          ln -f target/${{ env.PROFILE }}/conduwuit target/latest/conduwuit

      - name: Version check
        run: |
          ./target/latest/conduwuit --version | tee target/latest/conduwuit.version

      - name: Checkout Complement
        run: |
          # Manual checkout of complement to avoid Node overhead
          if [ ! -d "complement-src" ]; then
            git clone --depth 1 https://github.com/matrix-org/complement complement-src
          else
            cd complement-src && git fetch --depth 1 && git checkout FETCH_HEAD && cd ..
          fi

      - name: Build Complement Docker image
        run: |
          ls -l target/latest/conduwuit
          DOCKER_BUILDKIT=1 docker buildx build \
            --build-arg BINARY_PATH=./target/latest/conduwuit \
            -t continuwuity:complement \
            -f ./docker/complement.Dockerfile \
            --load .

      - name: Capture baseline stats
        run: VERBOSE=1 make complement/stats > baseline_stats.txt || true

      - name: Run Complement tests
        continue-on-error: true
        run: |
          mkdir -p tests/test_results/complement/
          ./bin/complement ./complement-src

      - name: Compare results with baseline
        run: |
          VERBOSE=1 make complement/stats > new_stats.txt || true
          echo "=== Changes from baseline ==="
          diff --color=always -u baseline_stats.txt new_stats.txt || true

      - name: Debug Results
        run: |
          echo "Checking results directory:"
          ls -la tests/test_results/complement/
          echo "Log file size:"
          stat -c%s tests/test_results/complement/test_logs.jsonl || echo "Log missing"
          echo "Results file size:"
          stat -c%s tests/test_results/complement/test_results.jsonl || echo "Results missing"

      - name: Summarize results
        id: summary
        run: |
          RESULTS="tests/test_results/complement/test_results.jsonl"
          if [ -f "$RESULTS" ]; then
            PASS=$(grep -c '"Action":"pass"' "$RESULTS" || true)
            FAIL=$(grep -c '"Action":"fail"' "$RESULTS" || true)
            SKIP=$(grep -c '"Action":"skip"' "$RESULTS" || true)
            TOTAL=$((PASS + FAIL + SKIP))
            echo "pass=$PASS" >> $GITHUB_OUTPUT
            echo "fail=$FAIL" >> $GITHUB_OUTPUT
            echo "skip=$SKIP" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          fi

      - name: Get conduwuit version
        id: version
        run: |
          # Use raw version output from the binary
          VERSION=$(./target/latest/conduwuit --version 2>/dev/null || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Results Ledger Repo
        uses: ./.forgejo/actions/update-results-ledger
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pass_count: ${{ steps.summary.outputs.pass || 0 }}
          fail_count: ${{ steps.summary.outputs.fail || 0 }}
          skip_count: ${{ steps.summary.outputs.skip || 0 }}
          version_string: ${{ steps.version.outputs.version }}
          actor: ${{ forge.actor || github.actor }}
          binary_path: target/latest/conduwuit

      - name: Upload test results
        uses: forgejo/upload-artifact@v4
        with:
          name: complement-results
          path: |
            tests/test_results/complement/test_results.jsonl
          retention-days: 90
