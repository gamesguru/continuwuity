---
name: Complement Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SKIP_CONFIRM: 1

jobs:
  complement-tests:
    runs-on: ubuntu-24.04
    # Removed container block to run on host and avoid DinD issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ forge.event.pull_request.head.sha || forge.sha }}
          fetch-tags: true
          fetch-depth: 0

      - name: Fetch tags manually
        run: git fetch --tags --force

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            pkg-config \
            liburing-dev \
            clang-18 \
            libclang-18-dev \
            llvm-18-dev

      - name: Setup Rust
        uses: ./.forgejo/actions/setup-rust
        with:
          github-token: ${{ secrets.GH_PUBLIC_RO }}

      - name: Build conduwuit for Complement
        run: PROFILE=dev SKIP_CONFIRM=1 CARGO_FLAGS="--features direct_tls" make build

      - name: Checkout Complement
        uses: actions/checkout@v4
        with:
          repository: matrix-org/complement
          path: complement-src

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: complement-src/go.sum

      - name: Build Complement Docker image
        run: docker build -t continuwuity:complement -f ./docker/complement.Dockerfile .

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build and run Complement tests
        continue-on-error: true
        run: |
          ./bin/complement ./complement-src

      - name: Summarize results
        id: summary
        if: always()
        run: |
          RESULTS="tests/test_results/complement/test_results.jsonl"
          if [ -f "$RESULTS" ]; then
            PASS=$(grep -c '"Action":"pass"' "$RESULTS" || true)
            FAIL=$(grep -c '"Action":"fail"' "$RESULTS" || true)
            SKIP=$(grep -c '"Action":"skip"' "$RESULTS" || true)
            TOTAL=$((PASS + FAIL + SKIP))
            echo "pass=$PASS" >> $GITHUB_OUTPUT
            echo "fail=$FAIL" >> $GITHUB_OUTPUT
            echo "skip=$SKIP" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          fi

      - name: Add PR comment
        if: ${{ forge.event_name == 'pull_request' && always() }}
        run: |
          PASS="${{ steps.summary.outputs.pass }}"
          FAIL="${{ steps.summary.outputs.fail }}"
          SKIP="${{ steps.summary.outputs.skip }}"
          TOTAL="${{ steps.summary.outputs.total }}"

          # Only post if we have results
          if [ -n "$TOTAL" ]; then
            BODY="Complement tests results: $PASS pass, $FAIL fail, $SKIP skip (total $TOTAL)"
            if [ "$FAIL" -gt 0 ]; then
              BODY="$BODY - ❌ Some tests failed!"
            else
              BODY="$BODY - ✅ All tests passed!"
            fi

            curl -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"body\": \"$BODY\"}" \
              "${{ forge.server_url }}/api/v1/repos/${{ forge.repository }}/issues/${{ forge.event.pull_request.number }}/comments"
          fi

      - name: Upload test logs
        if: always()
        uses: forgejo/upload-artifact@v4
        with:
          name: complement-logs
          path: tests/test_results/complement/
          retention-days: 90
