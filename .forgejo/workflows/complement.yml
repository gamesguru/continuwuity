---
name: Complement Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SKIP_CONFIRM: 1
  PATH: /opt/rust/cargo/bin:/home/forgejo-runner/.cargo/bin:${{ github.workspace }}/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  complement-tests:
    runs-on: ubuntu-24.04-avx512
    if: |
      (vars.C10Y_ENABLE_FORGE_WORKFLOW_PR_CHECKS != '' || github.event_name == 'workflow_dispatch')

    env:
      CARGO_BUILD_JOBS: 2
      # Persistent cache dirs
      CARGO_HOME: /home/forgejo-runner/.cache/conduwuit-ci/cargo
      CARGO_TARGET_DIR: /home/forgejo-runner/.cache/conduwuit-ci/target
      CCACHE_DIR: /home/forgejo-runner/.cache/conduwuit-ci/ccache
      RUSTC_WRAPPER: ccache

    steps:
      - name: Slim Checkout
        run: |
          # Use raw git to avoid Node-based checkout action
          if [ ! -d ".git" ]; then
            git init
            git remote add origin ${{ forge.server_url }}/${{ forge.repository }}
          fi
          git fetch --depth 1 origin ${{ forge.sha }}
          git checkout FETCH_HEAD
          git fetch --tags --force

      - name: Restore Cargo cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}
            ${{ env.CARGO_TARGET_DIR }}
            ${{ env.CCACHE_DIR }}
          key: continuwuity-complement-cache-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}
          restore-keys: |
            continuwuity-complement-cache-

      - name: Native Rust Setup
        run: |
          # Use rustup to ensure toolchain is ready, but let it handle the file automatically
          rustup show
          mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR" "$CCACHE_DIR"

      - name: Run Lints (Clippy)
        run: |
          cargo clippy \
            --workspace \
            --features full \
            --locked \
            --no-deps \
            --profile dev \
            -- -D warnings

      - name: Run Unit Tests
        run: |
          cargo test \
            --workspace \
            --features full \
            --locked \
            --profile dev \
            --all-targets \
            --no-fail-fast

      - name: Build conduwuit for Complement (Debug)
        run: |
          cargo build \
            --features full,direct_tls \
            --locked \
            --profile dev

      - name: Checkout Complement
        run: |
          # Manual checkout of complement to avoid Node overhead
          if [ ! -d "complement-src" ]; then
            git clone --depth 1 https://github.com/matrix-org/complement complement-src
          else
            cd complement-src && git fetch --depth 1 && git checkout FETCH_HEAD && cd ..
          fi

      - name: Build Complement Docker image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg BINARY_PATH=target/debug/conduwuit \
            -t continuwuity:complement \
            -f ./docker/complement.Dockerfile .

      - name: Run Complement tests
        continue-on-error: true
        run: |
          mkdir -p tests/test_results/complement/
          ./bin/complement ./complement-src

      - name: Debug Results
        if: always()
        run: |
          echo "Checking results directory:"
          ls -la tests/test_results/complement/
          echo "Log file size:"
          stat -c%s tests/test_results/complement/test_logs.jsonl || echo "Log missing"
          echo "Results file size:"
          stat -c%s tests/test_results/complement/test_results.jsonl || echo "Results missing"

      - name: Summarize results
        id: summary
        if: always()
        run: |
          RESULTS="tests/test_results/complement/test_results.jsonl"
          if [ -f "$RESULTS" ]; then
            PASS=$(grep -c '"Action":"pass"' "$RESULTS" || true)
            FAIL=$(grep -c '"Action":"fail"' "$RESULTS" || true)
            SKIP=$(grep -c '"Action":"skip"' "$RESULTS" || true)
            TOTAL=$((PASS + FAIL + SKIP))
            echo "pass=$PASS" >> $GITHUB_OUTPUT
            echo "fail=$FAIL" >> $GITHUB_OUTPUT
            echo "skip=$SKIP" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          fi

      - name: Update Results Ledger Repo
        if: always()
        run: |
          JSONL="tests/test_results/complement/test_results.jsonl"
          if [ ! -f "$JSONL" ]; then
            echo "⚠️ No test results found."
            exit 0
          fi

          # Ensure the results repo is present and up to date
          if [ ! -d "c10y-complement-results" ]; then
            git clone https://${{ secrets.GITHUB_TOKEN }}@forgejo.ellis.link/gamesguru/c10y-complement-results.git c10y-complement-results
          fi
          cd c10y-complement-results
          git pull --rebase || true

          # Initialize Schema
          sqlite3 ledger.db < tables.sql

          # Prepare metadata
          PASS="${{ steps.summary.outputs.pass || 0 }}"
          FAIL="${{ steps.summary.outputs.fail || 0 }}"
          SKIP="${{ steps.summary.outputs.skip || 0 }}"
          SHA="${{ forge.sha }}"

          # Detect Provider & Host
          PROVIDER=$([ -n "$FORGEJO_URL" ] && echo "forgejo" || echo "github")
          OS_INFO=$(lsb_release -ds 2>/dev/null || echo "Unknown OS")
          HOST_NAME=$(hostname)
          HOST_INFO="$OS_INFO ($HOST_NAME)"

          PR_NUM="${{ forge.event.pull_request.number || 'NULL' }}"
          REF_NAME="${{ forge.ref_name }}"
          ACTOR="${{ forge.actor }}"

          # Insert into runs and get ID
          RUN_ID=$(sqlite3 ledger.db "INSERT INTO runs (provider, host_info, commit_hash, pr_number, branch_or_pr_name, author_name, passed_count, skipped_count, failed_count) VALUES ('$PROVIDER', '$HOST_INFO', '$SHA', $PR_NUM, '$REF_NAME', '$ACTOR', $PASS, $SKIP, $FAIL); SELECT last_insert_rowid();")

          # Insert into run_details
          # {"Action":"pass","Test":"TestName"} -> ($RUN_ID, 'TestName', 'pass')
          # Escape single quotes in test names
          jq -r ". | \"INSERT INTO run_details (run_id, file_name, status) VALUES ($RUN_ID, '\" + (.Test | gsub(\"'\"; \"''\")) + \"', '\" + .Action + \"');\"" "../$JSONL" | sqlite3 ledger.db

          # Export CSVs
          make export

          # Commit and Push
          git config user.name "Forgejo Runner"
          git config user.email "runner@forgejo.ellis.link"
          git add .
          if git commit -m "Update results: $SHA ($REF_NAME)"; then
            git push
          else
            echo "Nothing to commit."
          fi

      - name: Add PR comment
        if: ${{ forge.event_name == 'pull_request' && always() }}
        run: |
          PASS="${{ steps.summary.outputs.pass }}"
          FAIL="${{ steps.summary.outputs.fail }}"
          SKIP="${{ steps.summary.outputs.skip }}"
          TOTAL="${{ steps.summary.outputs.total }}"

          # Only post if we have results
          if [ -n "$TOTAL" ]; then
            BODY="Complement tests results: $PASS pass, $FAIL fail, $SKIP skip (total $TOTAL)"
            if [ "$FAIL" -gt 0 ]; then
              BODY="$BODY - ❌ Some tests failed!"
            else
              BODY="$BODY - ✅ All tests passed!"
            fi

            curl -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"body\": \"$BODY\"}" \
              "${{ forge.server_url }}/api/v1/repos/${{ forge.repository }}/issues/${{ forge.event.pull_request.number }}/comments"
          fi

      - name: Save Cargo cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}
            ${{ env.CARGO_TARGET_DIR }}
            ${{ env.CCACHE_DIR }}
          key: continuwuity-complement-cache-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}

      - name: Upload test logs & ledger
        if: always()
        uses: forgejo/upload-artifact@v4
        with:
          name: complement-results
          path: |
            tests/test_results/complement/test_logs.jsonl
            tests/test_results/complement/test_results.jsonl
            c10y-complement-results/csvdata/
          retention-days: 90
