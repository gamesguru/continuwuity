---
name: "Ingest Run Data into PostgreSQL"
description: "Setup tables and ingest CI run details into a PostgreSQL database"

inputs:
  database_url:
    description: "PostgreSQL Connection URL"
    required: true
  pg_ca_crt:
    description: "Optional: PEM encoded CA certificate"
    default: ""
  pg_client_crt:
    description: "Optional: PEM encoded Client certificate"
    default: ""
  pg_client_key:
    description: "Optional: PEM encoded Client key"
    default: ""
  run_date:
    description: "Date/time of the run"
    required: true
  commit_hash:
    description: "Commit hash tested"
    required: true
  upstream_commit:
    description: "Upstream commit hash"
    default: ""
  branch:
    description: "Branch name"
    default: ""
  author_name:
    description: "Author name"
    default: ""
  actor:
    description: "Actor who triggered the run"
    default: ""
  provider:
    description: "CI Provider"
    default: ""
  arch:
    description: "Architecture"
    default: ""
  os:
    description: "Operating System"
    default: ""
  version_string:
    description: "Version string"
    default: ""
  features:
    description: "Cargo features"
    default: ""
  binary_sha256:
    description: "Binary SHA256"
    default: ""
  pass_count:
    description: "Passed tests count"
    required: true
  skip_count:
    description: "Skipped tests count"
    required: true
  fail_count:
    description: "Failed tests count"
    required: true
  results_file:
    description: "Path to test_results.jsonl"
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup mTLS Certificates
      shell: bash
      run: |
        if [ -n "${{ inputs.pg_ca_crt }}" ]; then
          mkdir -p "$HOME/.postgresql"
          echo "${{ inputs.pg_ca_crt }}" > "$HOME/.postgresql/root.crt"
          echo "${{ inputs.pg_client_crt }}" > "$HOME/.postgresql/postgresql.crt"
          echo "${{ inputs.pg_client_key }}" > "$HOME/.postgresql/postgresql.key"
          chmod 0600 "$HOME/.postgresql/postgresql.key"
        fi

    - name: Ensure Tables Exist
      shell: bash
      run: |
        psql "${{ inputs.database_url }}" \
          -f "${{ github.action_path }}/tables.sql"

    - name: Ingest Run Summary
      id: ingest_summary
      shell: bash
      run: |
        # Construct JSON payload with one entry per line for readability
        JSON=$(jq -n -c \
          --arg rd "${{ inputs.run_date }}" \
          --arg ch "${{ inputs.commit_hash }}" \
          --arg uc "${{ inputs.upstream_commit }}" \
          --arg br "${{ inputs.branch }}" \
          --arg an "${{ inputs.author_name }}" \
          --arg ac "${{ inputs.actor }}" \
          --arg pr "${{ inputs.provider }}" \
          --arg ar "${{ inputs.arch }}" \
          --arg os "${{ inputs.os }}" \
          --arg vs "${{ inputs.version_string }}" \
          --arg ft "${{ inputs.features }}" \
          --arg bs "${{ inputs.binary_sha256 }}" \
          --arg ps "${{ inputs.pass_count }}" \
          --arg sk "${{ inputs.skip_count }}" \
          --arg fl "${{ inputs.fail_count }}" \
          '{'
            run_date: $rd,
            commit_hash: $ch,
            upstream_commit: $uc,
            branch: $br,
            author_name: $an,
            actor: $ac,
            provider: $pr,
            arch: $ar,
            os: $os,
            version_string: $vs,
            features: $ft,
            binary_sha256: $bs,
            passed_count: ($ps|tonumber),
            skipped_count: ($sk|tonumber),
            failed_count: ($fl|tonumber)
          }')

        # Ingest summary using multi-line SQL for readability
        INSERT_SQL="
          INSERT INTO runs (
            run_date, commit_hash, upstream_commit, branch, author_name,
            actor, provider, arch, os, version_string, features,
            binary_sha256, passed_count, skipped_count, failed_count
          )
          SELECT
            (j->>'run_date')::timestamptz,
            (j->>'commit_hash'),
            (j->>'upstream_commit'),
            (j->>'branch'),
            (j->>'author_name'),
            (j->>'actor'),
            (j->>'provider'),
            (j->>'arch'),
            (j->>'os'),
            (j->>'version_string'),
            (j->>'features'),
            (j->>'binary_sha256'),
            (j->>'passed_count')::int,
            (j->>'skipped_count')::int,
            (j->>'failed_count')::int
          FROM (SELECT '\$JSON'::jsonb as j) s
          ON CONFLICT (commit_hash, run_date, arch, os) DO NOTHING
          RETURNING id;"

        PK_ID=$(psql "${{ inputs.database_url }}" -t -A -c "$INSERT_SQL" | head -n 1)

        if [ -z "$PK_ID" ]; then
          # Fallback lookup handles NULLs correctly
          LOOKUP_SQL="
            SELECT id FROM runs
            WHERE commit_hash = '${{ inputs.commit_hash }}'
              AND run_date = '${{ inputs.run_date }}'
              AND arch IS NOT DISTINCT FROM (NULLIF('${{ inputs.arch }}',''))
              AND os IS NOT DISTINCT FROM (NULLIF('${{ inputs.os }}',''));"
          PK_ID=$(psql "${{ inputs.database_url }}" -t -A -c "$LOOKUP_SQL")
        fi

        echo "machine_pk=$PK_ID" >> "$GITHUB_OUTPUT"

    - name: Ingest Run Details
      shell: bash
      run: |
        MACHINE_PK="${{ steps.ingest_summary.outputs.machine_pk }}"
        [ -z "$MACHINE_PK" ] && exit 0

        # Use simple pipe to psql to avoid YAML heredoc sensitivity
        # SQL logic split for maximum readability
        DETAILS_SQL="
          CREATE TEMP TABLE t (j jsonb);
          \copy t FROM STDIN csv quote e'\x01' delimiter e'\x02';
          INSERT INTO run_details (run_id, test_name, status)
          SELECT $MACHINE_PK, (j->>'Test'), (j->>'Action')
          FROM t
          ON CONFLICT (run_id, test_name) DO NOTHING;"

        cat "${{ inputs.results_file }}" | psql "${{ inputs.database_url }}" -c "$DETAILS_SQL"
