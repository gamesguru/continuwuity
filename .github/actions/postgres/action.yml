---
name: "Ingest Run Data into PostgreSQL"
description: "Setup tables and bulk sync recent CI run history into a PostgreSQL database"

inputs:
  database_url:
    description: "PostgreSQL Connection URL"
    required: true
  target_branch:
    description: "Branch where results ledger is stored"
    default: "_metadata/badges"

runs:
  using: "composite"
  steps:
    - name: Ensure Tables Exist
      shell: bash
      run: |
        psql "${{ inputs.database_url }}" \
          -f "${{ github.action_path }}/tables.sql"

    - name: Bulk Sync Recent History (Last 100 Runs)
      shell: bash
      run: |
        TEMP_LEDGER=$(mktemp -d)
        echo "→ Syncing last 100 runs from Git history..."

        # Clone only the necessary branch and history depth
        git clone --depth 100 --branch "${{ inputs.target_branch }}" \
          https://github.com/${{ github.repository }} "$TEMP_LEDGER" > /dev/null 2>&1

        if [ ! -f "$TEMP_LEDGER/runs.jsonl" ]; then
          echo "Error: Could not find runs.jsonl in history."
          exit 1
        fi

        # 1. Bulk Ingest Run Summaries
        SYNC_RUNS_SQL="
          CREATE TEMP TABLE b (j jsonb);
          \copy b FROM STDIN csv quote e'\x01' delimiter e'\x02';
          INSERT INTO runs (run_date, commit_hash, upstream_commit, branch, author_name, actor, provider, arch, os, version_string, features, binary_sha256, passed_count, skipped_count, failed_count)
          SELECT
            (j->>'run_date')::timestamptz, (j->>'commit_hash'), (j->>'upstream_commit')::text, (j->>'branch'),
            (j->>'author_name'), (j->>'actor'), (j->>'provider'), (j->>'arch'), (j->>'os'),
            (j->>'version_string'), (j->>'features'), (j->>'binary_sha256'),
            (j->'passed_count')::int, (j->'skipped_count')::int, (j->'failed_count')::int
          FROM b
          ON CONFLICT (commit_hash, run_date, arch, os) DO NOTHING;"

        cat "$TEMP_LEDGER/runs.jsonl" | psql "${{ inputs.database_url }}" -c "$SYNC_RUNS_SQL"

        # 2. Bulk Ingest Test Details for these 100 runs
        echo "→ Syncing test details for the last 100 runs..."
        SYNC_DETAILS_SQL="
          CREATE TEMP TABLE t (j jsonb);
          \copy t FROM STDIN csv quote e'\x01' delimiter e'\x02';
          INSERT INTO run_details (run_id, test_name, status)
          SELECT r.id, (t.j->>'Test'), (t.j->>'Action')
          FROM t
          JOIN runs r ON r.commit_hash = (t.j->>'commit')
          ON CONFLICT (run_id, test_name) DO NOTHING;"

        (
          for f in "$TEMP_LEDGER/runs_data"/*.jsonl; do
            [ -f "$f" ] || continue
            COMMIT=$(basename "$f" .jsonl)
            jq -c --arg h "$COMMIT" '. + {commit: $h}' "$f"
          done
        ) | psql "${{ inputs.database_url }}" -c "$SYNC_DETAILS_SQL"

        rm -rf "$TEMP_LEDGER"
