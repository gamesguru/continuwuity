---
name: "Ingest Run Data into PostgreSQL"
description: "Setup tables and bulk sync recent CI run history into a PostgreSQL database"

inputs:
  ssh_target:
    description: "SSH connection string (e.g., git@nutra.tk)"
    required: true
  target_branch:
    description: "Branch where results ledger is stored"
    default: "_metadata/badges"

runs:
  using: "composite"
  steps:
    - name: Ensure Tables Exist
      shell: bash
      run: |
        cat "${{ github.action_path }}/tables.sql" | ssh -C -o StrictHostKeyChecking=no "${{ inputs.ssh_target }}" "psql -U git c10y"

    - name: Sync Master Baseline
      shell: bash
      run: |
        echo "→ Syncing Master Baseline from origin/main..."
        (
          echo "CREATE TEMP TABLE mb (j jsonb);"
          echo "\copy mb FROM STDIN csv quote e'\x01' delimiter e'\x02';"
          git show origin/main:tests/test_results/complement/test_results.jsonl
          echo "\."
          echo "INSERT INTO master_baseline (test_name, status)
                SELECT (j->>'Test'), (j->>'Action') FROM mb
                ON CONFLICT (test_name) DO UPDATE SET status = EXCLUDED.status;"
        ) | ssh -C -o StrictHostKeyChecking=no "${{ inputs.ssh_target }}" "psql -U git c10y" > /dev/null

    - name: Bulk Sync History
      shell: bash
      run: |
        TEMP_LEDGER=$(mktemp -d)
        echo "→ Syncing last 100 runs from Git history..."

        git clone --depth 100 --branch "${{ inputs.target_branch }}" \
          https://github.com/${{ github.repository }} "$TEMP_LEDGER" > /dev/null 2>&1 || exit 0

        if [ ! -f "$TEMP_LEDGER/runs.jsonl" ]; then
          echo "Error: Could not find runs.jsonl in history."
          exit 1
        fi

        # 1. Ingest Summaries
        (
          echo "CREATE TEMP TABLE b (j jsonb);"
          echo "\copy b FROM STDIN csv quote e'\x01' delimiter e'\x02';"
          cat "$TEMP_LEDGER/runs.jsonl"
          echo "\."
          echo "INSERT INTO runs (run_date, commit_hash, upstream_commit, branch, author_name, actor, provider, arch, os, version_string, features, profile, binary_sha256, n_pass, n_skip, n_fail)
                SELECT
                  (j->>'run_date')::timestamptz, (j->>'commit_hash'), (j->>'upstream_commit'), (j->>'branch'),
                  (j->>'author_name'), (j->>'actor'), (j->>'provider'), NULLIF(j->>'arch', ''), NULLIF(j->>'os', ''),
                  (j->>'version_string'), (j->>'features'), (j->>'profile'), (j->>'binary_sha256'),
                  (j->'passed_count')::int, (j->'skipped_count')::int, (j->'failed_count')::int
                FROM b ON CONFLICT (commit_hash, run_date, arch, os) DO NOTHING;"
        ) | ssh -C -o StrictHostKeyChecking=no "${{ inputs.ssh_target }}" "psql -U git c10y"

        # 2. Ingest Test Details
        echo "→ Consolidating and ingesting test details..."
        (
          echo "CREATE TEMP TABLE t (j jsonb);"
          echo "\copy t FROM STDIN csv quote e'\x01' delimiter e'\x02';"
          for f in "$TEMP_LEDGER/runs_data"/*.jsonl; do
              [ -f "$f" ] || continue
              cat "$f"
          done
          echo "\."
          echo "INSERT INTO run_details (run_id, test_name, status)
                SELECT r.id, (t.j->>'Test'), (t.j->>'Action')
                FROM t JOIN runs r ON r.commit_hash = (t.j->>'commit')
                  AND r.arch IS NOT DISTINCT FROM (NULLIF((t.j->>'arch'), ''))
                  AND r.os IS NOT DISTINCT FROM (NULLIF((t.j->>'os'), ''))
                ON CONFLICT (run_id, test_name) DO NOTHING;"
        ) | ssh -C -o StrictHostKeyChecking=no "${{ inputs.ssh_target }}" "psql -U git c10y"

        rm -rf "$TEMP_LEDGER"
