name: "Ingest Run Data into PostgreSQL"
description: "Setup tables and ingest CI run details into a PostgreSQL database"

inputs:
  database_url:
    description: "PostgreSQL Connection URL"
    required: true
  pg_ca_crt:
    description: "Optional: PEM encoded CA certificate (ca.crt)"
    default: ""
  pg_client_crt:
    description: "Optional: PEM encoded Client certificate (client.crt)"
    default: ""
  pg_client_key:
    description: "Optional: PEM encoded Client key (client.key)"
    default: ""
  run_date:
    description: "Date/time of the run"
    required: true
  commit_hash:
    description: "Commit hash tested"
    required: true
  upstream_commit:
    description: "Upstream commit hash"
    default: ""
  branch:
    description: "Branch name"
    default: ""
  author_name:
    description: "Author name"
    default: ""
  actor:
    description: "Actor who triggered the run"
    default: ""
  provider:
    description: "CI Provider"
    default: ""
  arch:
    description: "Architecture"
    default: ""
  os:
    description: "Operating System"
    default: ""
  version_string:
    description: "Version string"
    default: ""
  features:
    description: "Cargo features"
    default: ""
  binary_sha256:
    description: "Binary SHA256"
    default: ""
  pass_count:
    description: "Passed tests count"
    required: true
  skip_count:
    description: "Skipped tests count"
    required: true
  fail_count:
    description: "Failed tests count"
    required: true
  results_file:
    description: "Path to test_results.jsonl"
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup mTLS Certificates
      shell: bash
      run: |
        if [ -n "${{ inputs.pg_ca_crt }}" ]; then
          mkdir -p "$HOME/.postgresql"
          echo "${{ inputs.pg_ca_crt }}" > "$HOME/.postgresql/root.crt"
          echo "${{ inputs.pg_client_crt }}" > "$HOME/.postgresql/postgresql.crt"
          echo "${{ inputs.pg_client_key }}" > "$HOME/.postgresql/postgresql.key"
          chmod 0600 "$HOME/.postgresql/postgresql.key"
        fi

    - name: Ensure Tables Exist
      shell: bash
      run: |
        psql "${{ inputs.database_url }}" -f "${{ github.action_path }}/tables.sql"

    - name: Ingest Run Summary
      id: ingest_summary
      shell: bash
      run: |
        # Use native PostgreSQL JSON parsing to avoid bash/jq escaping hell
        JSON_PAYLOAD=$(jq -n -c \
          --arg run_date "${{ inputs.run_date }}" \
          --arg commit_hash "${{ inputs.commit_hash }}" \
          --arg upstream "${{ inputs.upstream_commit }}" \
          --arg branch "${{ inputs.branch }}" \
          --arg author_name "${{ inputs.author_name }}" \
          --arg actor "${{ inputs.actor }}" \
          --arg provider "${{ inputs.provider }}" \
          --arg arch "${{ inputs.arch }}" \
          --arg os "${{ inputs.os }}" \
          --arg version_string "${{ inputs.version_string }}" \
          --arg features "${{ inputs.features }}" \
          --arg binary_sha256 "${{ inputs.binary_sha256 }}" \
          --arg pass "${{ inputs.pass_count }}" \
          --arg skip "${{ inputs.skip_count }}" \
          --arg fail "${{ inputs.fail_count }}" \
          '{run_date: $run_date, commit_hash: $commit_hash, upstream_commit: $upstream, branch: $branch, author_name: $author_name, actor: $actor, provider: $provider, arch: $arch, os: $os, version_string: $version_string, features: $features, binary_sha256: $binary_sha256, passed_count: ($pass|tonumber), skipped_count: ($skip|tonumber), failed_count: ($fail|tonumber)}')

        PK_ID=$(psql "${{ inputs.database_url }}" -t -A -c "
          INSERT INTO runs (run_date, commit_hash, upstream_commit, branch, author_name, actor, provider, arch, os, version_string, features, binary_sha256, passed_count, skipped_count, failed_count)
          SELECT
            (j->>'run_date')::timestamptz, (j->>'commit_hash'), (j->>'upstream_commit'), (j->>'branch'),
            (j->>'author_name'), (j->>'actor'), (j->>'provider'), (j->>'arch'), (j->>'os'),
            (j->>'version_string'), (j->>'features'), (j->>'binary_sha256'),
            (j->>'passed_count')::int, (j->>'skipped_count')::int, (j->>'failed_count')::int
          FROM (SELECT '$JSON_PAYLOAD'::jsonb as j) s
          ON CONFLICT (commit_hash, run_date, arch, os) DO NOTHING
          RETURNING id;
        " | head -n 1)

        if [ -z "$PK_ID" ]; then
            PK_ID=$(psql "${{ inputs.database_url }}" -t -A -c "
              SELECT id FROM runs
              WHERE commit_hash = '${{ inputs.commit_hash }}'
              AND run_date = '${{ inputs.run_date }}'
              AND arch IS NOT DISTINCT FROM (CASE WHEN '${{ inputs.arch }}' = '' THEN NULL ELSE '${{ inputs.arch }}' END)
              AND os IS NOT DISTINCT FROM (CASE WHEN '${{ inputs.os }}' = '' THEN NULL ELSE '${{ inputs.os }}' END);" | head -n 1)
        fi

        echo "machine_pk=$PK_ID" >> "$GITHUB_OUTPUT"

    - name: Ingest Run Details
      shell: bash
      run: |
        RESULTS_FILE="${{ inputs.results_file }}"
        MACHINE_PK="${{ steps.ingest_summary.outputs.machine_pk }}"

        if [ -z "$MACHINE_PK" ] || [[ ! "$MACHINE_PK" =~ ^[0-9]+$ ]]; then
          echo "Machine run could not be linked. Skipping details ingestion."
          exit 0
        fi

        if [ ! -f "$RESULTS_FILE" ]; then
          echo "Results file not found: $RESULTS_FILE"
          exit 0
        fi

        # Stream details via temporary jsonb table for performance and safety
        psql "${{ inputs.database_url }}" <<EOF
        CREATE TEMP TABLE tmp_details_ingest (j jsonb);
        \copy tmp_details_ingest FROM '$RESULTS_FILE' csv quote e'\x01' delimiter e'\x02';

        INSERT INTO run_details (run_id, test_name, status)
        SELECT $MACHINE_PK, (j->>'Test'), (j->>'Action')
        FROM tmp_details_ingest
        ON CONFLICT (run_id, test_name) DO NOTHING;
EOF
