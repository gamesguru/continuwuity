---
name: "Setup RocksDB"
description: "Downloads or builds and caches RocksDB"
inputs:
  version:
    description: "RocksDB version to use"
    required: true
    default: "10.5.1"
  cache-key:
    description: "Unique cache key suffix (e.g. ubuntu-24.04)"
    required: true
  arch:
    description: "Target architecture tag (e.g. x86-64-v3, x86-64-v4, arm64-cortex-a76)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Restore cache
      id: rocksdb-cache
      uses: actions/cache/restore@v4
      with:
        path: ~/.local
        key: rocksdb-${{ inputs.version }}-${{ inputs.arch }}-${{ inputs.cache-key }}

    - name: Try download from Release
      if: steps.rocksdb-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        VERSION="${{ inputs.version }}"
        TAG="rocksdb-${VERSION}"
        FILENAME="rocksdb-${VERSION}-${{ inputs.arch }}-${{ inputs.cache-key }}.tar.gz"

        echo "Attempting to download pre-built RocksDB using gh CLI"
        # Download tarball and the central signed sums
        if gh release download "$TAG" --pattern "$FILENAME" --pattern "SHA256SUMS*" --repo "${{ github.repository }}"; then
          echo "Verifying checksum..."
          if grep "$FILENAME" SHA256SUMS | sha256sum --check; then
            echo "Successfully verified and downloaded pre-built RocksDB"
            mkdir -p ~/.local
            tar -xzvf "$FILENAME" -C ~/.local
          else
            echo "Checksum verification failed!"
            exit 1
          fi
        else
          echo "Pre-built RocksDB not found in releases"
        fi

    - name: Build RocksDB (fallback)
      shell: bash
      run: |
        if [ ! -f "$HOME/.local/lib/librocksdb.so" ]; then
          echo "RocksDB not found in cache or releases, building from source..."
          git clone --recursive https://github.com/zaidoon1/rust-rocksdb.git /tmp/rust-rocksdb
          cd /tmp/rust-rocksdb/librocksdb-sys/rocksdb
          make clean

          ARCH="${{ inputs.arch }}"
          if [[ "$ARCH" == "arm64-cortex-a76" || "$ARCH" == "cortex-a76" ]]; then
            EXTRA_FLAGS="-march=armv8.2-a+crc"
          elif [[ "$ARCH" == x86-64-v* ]]; then
            EXTRA_FLAGS="-march=$ARCH -mpclmul"
          else
            EXTRA_FLAGS="-march=$ARCH"
          fi

          DISABLE_JEMALLOC=1 \
            EXTRA_CFLAGS="-Wno-error=unused-parameter $EXTRA_FLAGS" \
            EXTRA_CXXFLAGS="-Wno-error=unused-parameter $EXTRA_FLAGS" \
            make shared_lib -j$(nproc)
          mkdir -p ~/.local
          make install-shared PREFIX=~/.local
        else
          echo "RocksDB already present (from cache or download)"
        fi

    - name: Upload to Release (Promotion)
      if: github.event_name != 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GPG_PRIVATE_KEY: ${{ secrets.C10Y_BINARY_RELEASE_GPG_PRIVATE_KEY }}
        GPG_PASSPHRASE: ${{ secrets.C10Y_BINARY_RELEASE_GPG_PRIVATE_KEY_PASSWORD }}
      run: |
        VERSION="${{ inputs.version }}"
        TAG="rocksdb-${VERSION}"
        FILENAME="rocksdb-${VERSION}-${{ inputs.arch }}-${{ inputs.cache-key }}.tar.gz"

        # Only upload if the file doesn't exist in the release yet
        if ! gh release view "$TAG" --repo "${{ github.repository }}" 2>/dev/null | grep -q "$FILENAME"; then
          echo "Promoting RocksDB to release $TAG..."
          tar -czvf "$FILENAME" -C ~/.local .
          sha256sum "$FILENAME" > "$FILENAME.sha256"

          gh release create "$TAG" --title "RocksDB ${VERSION} Pre-builts" --notes "Automated pre-built RocksDB binaries for CI" || true
          gh release upload "$TAG" "$FILENAME" --clobber

          # Update central signed checksums
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
            gh release download "$TAG" --pattern "SHA256SUMS*" || true
            cat "$FILENAME.sha256" >> SHA256SUMS
            sort -u SHA256SUMS -o SHA256SUMS
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback --clearsign --output SHA256SUMS.asc SHA256SUMS
            gh release upload "$TAG" SHA256SUMS SHA256SUMS.asc --clobber
          fi
        else
          echo "$FILENAME already exists in release."
        fi

    - name: Export Paths
      shell: bash
      run: |
        echo "ROCKSDB_INCLUDE_DIR=$HOME/.local/include" >> $GITHUB_ENV
        echo "ROCKSDB_LIB_DIR=$HOME/.local/lib" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=$HOME/.local/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    - name: Save cache
      if: steps.rocksdb-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/.local
        key: rocksdb-${{ inputs.version }}-${{ inputs.arch }}-${{ inputs.cache-key }}
