name: 'Setup RocksDB'
description: 'Builds and caches RocksDB 10.5.1 from source'
inputs:
  cache-key:
    description: 'Unique cache key suffix (e.g. ubuntu-24.04)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Cache RocksDB
      id: rocksdb-cache
      uses: actions/cache@v4
      with:
        path: ~/.local-rocksdb
        key: rocksdb-10.5.1-${{ inputs.cache-key }}

    - name: Build RocksDB (from fork)
      if: steps.rocksdb-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        # We MUST clone the fork because it contains custom C API patches
        # not present in upstream Facebook RocksDB (e.g. rocksdb_livefiles_column_family_name)
        git clone --recursive https://github.com/zaidoon1/rust-rocksdb.git /tmp/rust-rocksdb
        cd /tmp/rust-rocksdb/librocksdb-sys/rocksdb
        make clean
        DISABLE_JEMALLOC=0 EXTRA_CXXFLAGS="-Wno-error=unused-parameter" make shared_lib -j$(nproc)
        mkdir -p ~/.local-rocksdb
        make install-shared INSTALL_PATH=~/.local-rocksdb

    - name: Export Paths
      shell: bash
      run: |
        echo "ROCKSDB_LIB_DIR=$HOME/.local-rocksdb/lib" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=$HOME/.local-rocksdb/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
