---
name: "Setup Prebuilts"
description: "Downloads and caches Prebuilt Libraries (RocksDB, jemalloc, etc)"
inputs:
  release_tag:
    description: "Release tag (e.g. v0.5)"
    required: true
    default: "v0.5"
  cache-key:
    description: "Unique cache key suffix (e.g. ubuntu-24.04)"
    required: true
  arch:
    description: "Target architecture tag (e.g. x86-64-v3, x86-64-v4, arm64-cortex-a76)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Try download from Release
      id: download
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        TAG="${{ inputs.release_tag }}"
        PATTERN="*-${{ inputs.arch }}-${{ inputs.cache-key }}.tar.gz"

        echo "Attempting to download prebuilts using gh CLI"
        mkdir -p /tmp/prebuilts_download
        if gh release download "$TAG" --pattern "$PATTERN" --dir /tmp/prebuilts_download --repo "${{ github.repository }}"; then
          if [ "$(ls -A /tmp/prebuilts_download)" ]; then
            echo "Successfully downloaded prebuilts"
            for archive in /tmp/prebuilts_download/*.tar.gz; do
              sudo tar -xzvf "$archive" -C /usr/local
            done
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "No prebuilts found matching pattern"
            echo "found=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "Prebuilts not found in releases"
          echo "found=false" >> $GITHUB_OUTPUT
        fi

    - name: Restore cache
      if: steps.download.outputs.found == 'false'
      id: prebuilts-cache
      uses: actions/cache/restore@v4
      with:
        path: /usr/local
        key: prebuilts-${{ inputs.release_tag }}-${{ inputs.arch }}-${{ inputs.cache-key }}

    - name: Verify Prebuilts Configuration
      shell: bash
      run: |
        if [ -z "$(ls -A /usr/local/lib/librocksdb* 2>/dev/null)" ]; then
          echo "Error: Static Prebuilts not found in cache or releases."
          echo "Please ensure the 'Build Prebuilts' workflow has completed for this combination."
          echo "Tag: ${{ inputs.release_tag }} - Arch: ${{ inputs.arch }} - OS: ${{ inputs.cache-key }}"
          exit 1
        fi
        echo "Static Prebuilts are present."

    - name: Export Paths
      shell: bash
      run: |
        echo "ROCKSDB_INCLUDE_DIR=/usr/local/include" >> $GITHUB_ENV
        echo "ROCKSDB_LIB_DIR=/usr/local/lib" >> $GITHUB_ENV
        # Try both libjemalloc.a and libjemalloc_pic.a as jemalloc fallback sometimes builds with pic suffix
        if [ -f "/usr/local/lib/libjemalloc.a" ]; then
          echo "JEMALLOC_OVERRIDE=/usr/local/lib/libjemalloc.a" >> $GITHUB_ENV
        elif [ -f "/usr/local/lib/libjemalloc_pic.a" ]; then
          echo "JEMALLOC_OVERRIDE=/usr/local/lib/libjemalloc_pic.a" >> $GITHUB_ENV
        fi

    - name: Save cache
      if: steps.prebuilts-cache.outputs.cache-hit != 'true' && steps.download.outputs.found == 'false'
      uses: actions/cache/save@v4
      with:
        path: /usr/local
        key: prebuilts-${{ inputs.release_tag }}-${{ inputs.arch }}-${{ inputs.cache-key }}
