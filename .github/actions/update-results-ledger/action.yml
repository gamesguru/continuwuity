---
name: "Update Results Ledger"
description: "Appends test results to runs.jsonl and updates badge-main.json on the orphan results branch"
inputs:
  target_branch:
    description: "Orphan branch to store results on"
    default: "_metadata/badges"
  github_token:
    description: "Token for authenticated push (GITHUB_TOKEN or equivalent)"
    required: true
  pass_count:
    required: true
  fail_count:
    required: true
  skip_count:
    required: true
  version_string:
    required: true
  actor:
    required: true
  binary_path:
    description: "Path to the tested binary"
    default: "target/debug/conduwuit"
  features:
    description: "Space-separated list of cargo features used for this build"
    default: ""
  arch:
    description: "Architecture"
    default: ""
  os:
    description: "Operating System"
    default: ""
  profile:
    description: "Build profile (e.g. release, debug, release-quick)"
    default: ""
  room_version:
    description: "Room version"
    default: ""

outputs:
  upstream_commit:
    description: "The calculated upstream commit hash"
    value: ${{ steps.append.outputs.upstream_commit }}

runs:
  using: "composite"
  steps:
    - name: "Append results and update badge"
      id: append
      shell: bash
      run: |
        set -euo pipefail
        set -x  # echo commands for debugging

        PASS="${{ inputs.pass_count }}"
        FAIL="${{ inputs.fail_count }}"
        SKIP="${{ inputs.skip_count }}"
        VERSION_STRING="${{ inputs.version_string }}"
        ACTOR="${{ inputs.actor }}"
        BINARY_PATH="${{ inputs.binary_path }}"
        FEATURES="${{ inputs.features }}"
        ARCH="${{ inputs.arch }}"
        OS="${{ inputs.os }}"
        PROFILE="${{ inputs.profile }}"
        ROOM_VERSION="${{ inputs.room_version }}"

        # Extract commit hash from version string, fall back to env
        BIN_VER_HASH=$(echo "$VERSION_STRING" | sed -n 's/.*~\([0-9a-f]\{7,\}\).*/\1/p')
        COMMIT_HASH="${BIN_VER_HASH:-${GITHUB_SHA:-unknown}}"

        # Use full hash by default if possible
        if [ "$COMMIT_HASH" != "unknown" ]; then
          FULL_HASH=$(git rev-parse "$COMMIT_HASH" 2>/dev/null || echo "$COMMIT_HASH")
          COMMIT_HASH="$FULL_HASH"
        fi

        RUN_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        RUN_ID="${COMMIT_HASH}-${RUN_DATE}"
        BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
        [ -z "$BRANCH_NAME" ] && BRANCH_NAME="main"

        # Determine Provider (Internalized Logic)
        if [ "$BRANCH_NAME" = "main-upstream" ] || [ -n "${FORGEJO_URL:-}" ]; then
          PROVIDER="Forge"
        else
          PROVIDER="GitHub"
        fi

        # SHA256 of the tested binary
        BIN_SHA="unknown"
        [ -f "$BINARY_PATH" ] && BIN_SHA=$(sha256sum "$BINARY_PATH" | awk '{print $1}')

        # Determine Author Name and Upstream Commit
        UPSTREAM_COMMIT=""
        AUTHOR_NAME=""
        if [ "$COMMIT_HASH" != "unknown" ]; then
          # Fetch true upstream main to find the definitive merge base
          UPSTREAM_URL="https://forgejo.ellis.link/continuwuation/continuwuity.git"
          if git fetch "$UPSTREAM_URL" main 2>/dev/null; then
            UPSTREAM_COMMIT=$(git merge-base FETCH_HEAD "$COMMIT_HASH" 2>/dev/null || echo "")
          fi
          if [ -n "$UPSTREAM_COMMIT" ]; then
            AUTHOR_NAME=$(git log -1 --format='%an' "$UPSTREAM_COMMIT" 2>/dev/null || echo "")
          fi
        fi

        echo "upstream_commit=$UPSTREAM_COMMIT" >> "$GITHUB_OUTPUT"

        # --- Work on the orphan branch via worktree ---
        LEDGER_DIR="/tmp/ledger-$$"

        git config --global user.name "CI Runner"
        git config --global user.email "runner@ci.local"

        # Configure token-based auth for push
        REPO_URL=$(git remote get-url origin)
        if [[ "$REPO_URL" == https://* ]]; then
          # Insert token into HTTPS URL for authenticated push
          AUTHED_URL=$(echo "$REPO_URL" | sed "s|https://|https://token:${{ inputs.github_token }}@|")
          git remote set-url origin "$AUTHED_URL"
        fi

        TARGET_BRANCH="${{ inputs.target_branch }}"

        # Fetch the orphan branch using the full refspec
        if git fetch origin "refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}" 2>/dev/null; then
          git worktree add "$LEDGER_DIR" "origin/${TARGET_BRANCH}"
        else
          # Branch doesn't exist yet — create it as a new orphan
          git worktree add --detach "$LEDGER_DIR"
          cd "$LEDGER_DIR"
          git checkout --orphan "${TARGET_BRANCH}"
          git rm -rf . 2>/dev/null || true
          echo "ledger.db" > .gitignore
          cd -
        fi

        # Save the full results data uniquely per machine.
        # We inject the commit, arch, and os into EVERY line of the JSONL.
        RESULTS_FILE="tests/test_results/complement/test_results.jsonl"
        if [ -f "$RESULTS_FILE" ]; then
          mkdir -p "$LEDGER_DIR/runs_data"
          SAFE_ARCH=$(echo "$ARCH" | sed 's/[^a-zA-Z0-9._-]/_/g')
          SAFE_OS=$(echo "$OS" | sed 's/[^a-zA-Z0-9._-]/_/g')
          SAFE_PROFILE=$(echo "$PROFILE" | sed 's/[^a-zA-Z0-9._-]/_/g')
          SAFE_ROOM_VERSION=$(echo "$ROOM_VERSION" | sed 's/[^a-zA-Z0-9._-]/_/g')

          jq -c --arg h "$COMMIT_HASH" --arg a "$ARCH" --arg o "$OS" --arg p "$PROFILE" --arg rv "$ROOM_VERSION" \
            '. + {commit: $h, arch: $a, os: $o, profile: $p, room_version: $rv}' "$RESULTS_FILE" \
            > "$LEDGER_DIR/runs_data/${COMMIT_HASH}-${SAFE_ARCH}-${SAFE_OS}-${SAFE_PROFILE}-${SAFE_ROOM_VERSION}.jsonl"
        fi

        cd "$LEDGER_DIR"

        # Ensure files exist
        touch runs.jsonl

        # Append run summary
        jq -n -c \
          --arg run_id "$RUN_ID" \
          --arg run_date "$RUN_DATE" \
          --arg commit_hash "$COMMIT_HASH" \
          --arg upstream_commit "$UPSTREAM_COMMIT" \
          --arg branch "$BRANCH_NAME" \
          --arg author_name "$AUTHOR_NAME" \
          --arg actor "$ACTOR" \
          --arg provider "$PROVIDER" \
          --arg arch "$ARCH" \
          --arg os "$OS" \
          --arg profile "$PROFILE" \
          --arg binary_sha256 "$BIN_SHA" \
          --arg version_string "$VERSION_STRING" \
          --arg features "$FEATURES" \
          --arg room_version "$ROOM_VERSION" \
          --arg pass "$PASS" \
          --arg skip "$SKIP" \
          --arg fail "$FAIL" \
          '{
            run_id: $run_id,
            run_date: $run_date,
            commit_hash: $commit_hash,
            upstream_commit: (if $upstream_commit == "" then null else $upstream_commit end),
            branch: $branch,
            author_name: $author_name,
            actor: $actor,
            provider: $provider,
            arch: $arch,
            os: $os,
            profile: $profile,
            version_string: $version_string,
            features: $features,
            room_version: $room_version,
            binary_sha256: $binary_sha256,
            passed_count: ($pass|tonumber),
            skipped_count: ($skip|tonumber),
            failed_count: ($fail|tonumber)
          }' >> runs.jsonl

        # Generate badge JSON (shields.io endpoint schema)
        if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "main-upstream" ]; then
          if [ "$FAIL" -gt 0 ]; then COLOR="red"
          elif [ "$SKIP" -gt 0 ]; then COLOR="yellow"
          else COLOR="green"
          fi

          # shields.io compatible schema
          jq -n \
            --arg pass "$PASS" \
            --arg skip "$SKIP" \
            --arg fail "$FAIL" \
            --arg color "$COLOR" \
            --arg provider_name "$PROVIDER" \
            '{
              schemaVersion: 1,
              label: "Complement Tests (\($provider_name))",
              message: "\($pass) pass, \($skip) skip, \($fail) fail",
              color: $color
            }' > "badge-${BRANCH_NAME}.json"
          git add "badge-${BRANCH_NAME}.json"
        fi

        # Commit and push, retrying
        git add runs.jsonl runs_data/ 2>/dev/null || true

        if git -c commit.gpgsign=false commit -m "Results for ${COMMIT_HASH} (${PROVIDER}) [skip ci]"; then
          MAX_RETRIES=5
          RETRY_COUNT=0
          until git push origin "HEAD:refs/heads/${TARGET_BRANCH}"; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ "$RETRY_COUNT" -ge "$MAX_RETRIES" ]; then
              echo "Failed to push after $MAX_RETRIES attempts."
              exit 1
            fi
            echo "Push failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
            sleep $(( (RANDOM % 5) + 1 ))
            git pull --rebase origin "refs/heads/${TARGET_BRANCH}"
          done
        fi

        # Cleanup
        cd -
        git worktree remove "$LEDGER_DIR" --force 2>/dev/null || true
