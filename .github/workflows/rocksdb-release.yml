name: Build RocksDB Releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: "RocksDB version"
        required: true
        default: "10.5.1"

jobs:
  build:
    name: Build RocksDB (${{ matrix.arch }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}${{ contains(matrix.arch, 'arm64') && '-arm' || '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        arch: [x86-64-v3, x86-64-v4, arm64-cortex-a76]

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            liburing-dev \
            clang \
            libclang-dev \
            llvm-dev

      - name: Build RocksDB
        shell: bash
        run: |
          git clone --recursive https://github.com/zaidoon1/rust-rocksdb.git /tmp/rust-rocksdb
          cd /tmp/rust-rocksdb/librocksdb-sys/rocksdb

          ARCH="${{ matrix.arch }}"
          if [[ "$ARCH" == "arm64-cortex-a76" ]]; then
            EXTRA_FLAGS="-march=armv8.2-a+crc"
          elif [[ "$ARCH" == x86-64-v* ]]; then
            EXTRA_FLAGS="-march=$ARCH -mpclmul"
          else
            EXTRA_FLAGS="-march=$ARCH"
          fi

          DISABLE_JEMALLOC=1 \
            EXTRA_CFLAGS="-Wno-error=unused-parameter $EXTRA_FLAGS" \
            EXTRA_CXXFLAGS="-Wno-error=unused-parameter $EXTRA_FLAGS" \
            make shared_lib -j$(nproc)

          mkdir -p rocksdb-release/lib rocksdb-release/include
          make install-sharedPREFIX=$(pwd)/rocksdb-release

          FILENAME="rocksdb-${{ github.event.inputs.version }}-${{ matrix.arch }}-${{ matrix.os }}.tar.gz"
          tar -czvf "../../../$FILENAME" -C rocksdb-release .
          cd ../../..
          sha256sum "$FILENAME" > "$FILENAME.sha256"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.C10Y_BINARY_RELEASE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.C10Y_BINARY_RELEASE_GPG_PRIVATE_KEY_PASSWORD }}

      - name: Create/Upload Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="rocksdb-${{ github.event.inputs.version }}"
          FILENAME="rocksdb-${{ github.event.inputs.version }}-${{ matrix.arch }}-${{ matrix.os }}.tar.gz"

          # Create release if it doesn't exist
          gh release create "$TAG" --title "RocksDB ${{ github.event.inputs.version }} Pre-builts" --notes "Automated pre-built RocksDB binaries for CI" || true

          # Upload tarball
          gh release upload "$TAG" "$FILENAME" --clobber

          # Update/Upload signed checksums (cumulative)
          gh release download "$TAG" --pattern "SHA256SUMS*" || true
          cat "$FILENAME.sha256" >> SHA256SUMS
          sort -u SHA256SUMS -o SHA256SUMS
          gpg --batch --yes --clearsign --output SHA256SUMS.asc SHA256SUMS
          gh release upload "$TAG" SHA256SUMS SHA256SUMS.asc --clobber
