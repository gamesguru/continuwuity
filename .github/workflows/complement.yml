---
name: Complement Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  complement:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.head_ref }}
          fetch-tags: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            liburing-dev \
            clang \
            libclang-dev \
            llvm-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.90.0"

      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Build conduwuit for Complement
        run: PROFILE=dev SKIP_CONFIRM=1 CARGO_FLAGS="--features direct_tls" make build

      - name: Checkout Complement
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: matrix-org/complement
          path: complement-src

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: complement-src/go.sum

      - name: Build Complement Docker image
        run: docker build -t continuwuity:complement -f ./docker/complement.Dockerfile .

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build and run Complement tests
        continue-on-error: true
        run: |
          ./bin/complement ./complement-src

      - name: Parse Complement results
        if: always()
        id: results
        run: |
          if [ -f complement_test_results.jsonl ]; then
            # Calculate summary numbers
            PASS=$(jq -s '[.[] | select(.Action == "pass")] | length' complement_test_results.jsonl)
            FAIL=$(jq -s '[.[] | select(.Action == "fail")] | length' complement_test_results.jsonl)
            SKIP=$(jq -s '[.[] | select(.Action == "skip")] | length' complement_test_results.jsonl)
            TOTAL=$((PASS + FAIL + SKIP))

            # Identify regressions vs baseline
            TOUCH_BASELINE="tests/complement-baseline.txt"
            [ -f "$TOUCH_BASELINE" ] || touch "$TOUCH_BASELINE"

            jq -r 'select(.Action == "fail") | .Test' complement_test_results.jsonl | sort -u > current_failures.txt
            sort -u "$TOUCH_BASELINE" > baseline.txt

            NEW_FAILURES=$(comm -13 baseline.txt current_failures.txt || true)
            FIXED_TESTS=$(comm -23 baseline.txt current_failures.txt || true)

            NUM_NEW=$(echo "$NEW_FAILURES" | grep -c . || echo 0)
            NUM_FIXED=$(echo "$FIXED_TESTS" | grep -c . || echo 0)

            echo "pass=$PASS" >> "$GITHUB_OUTPUT"
            echo "fail=$FAIL" >> "$GITHUB_OUTPUT"
            echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
            echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
            echo "num_new=$NUM_NEW" >> "$GITHUB_OUTPUT"
            echo "num_fixed=$NUM_FIXED" >> "$GITHUB_OUTPUT"

            echo "new_failures<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NEW_FAILURES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"

            echo "fixed_tests<<EOF" >> "$GITHUB_OUTPUT"
            echo "$FIXED_TESTS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "pass=0" >> "$GITHUB_OUTPUT"
            echo "fail=0" >> "$GITHUB_OUTPUT"
            echo "skip=0" >> "$GITHUB_OUTPUT"
            echo "total=0" >> "$GITHUB_OUTPUT"
            echo "num_new=0" >> "$GITHUB_OUTPUT"
            echo "num_fixed=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Post Complement results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const pass = parseInt("${{ steps.results.outputs.pass }}") || 0;
            const fail = parseInt("${{ steps.results.outputs.fail }}") || 0;
            const skip = parseInt("${{ steps.results.outputs.skip }}") || 0;
            const total = parseInt("${{ steps.results.outputs.total }}") || 0;

            const body = [
              '## Complement Test Results',
              '',
              '| Status | Count |',
              '|--------|-------|',
              `| ✓ Pass | ${pass} |`,
              `| ✗ Fail | ${fail} |`,
              `| ○ Skip | ${skip} |`,
              `| **Total** | **${total}** |`,
              '',
              '<!-- complement-test-results -->'
            ].join('\n');

            const issue_number = context.payload.pull_request ? context.payload.pull_request.number : context.issue.number;
            if (!issue_number) {
              console.log("No PR number found in context, skipping comment.");
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
            });

            const existing = comments.find(c =>
              c.body && c.body.includes('<!-- complement-test-results -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue_number,
                body,
              });
            }

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: complement-logs
          path: |
            complement_test_logs.jsonl
            complement_test_results.jsonl
          retention-days: 90
