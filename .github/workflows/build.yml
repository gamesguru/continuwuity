---
name: Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Cargo profile to build'
        type: choice
        options:
          - bench
          - dev
          - dev-quick
          - release
          - release-debuginfo
          - release-high-perf
          - release-max-perf
          - release-quick
          - test
        default: 'release-max-perf'
      feat_bindgen_runtime:
        description: 'Feature: bindgen-runtime'
        type: boolean
        default: false
      feat_bindgen_static:
        description: 'Feature: bindgen-static'
        type: boolean
        default: false
      feat_blurhashing:
        description: 'Feature: blurhashing'
        type: boolean
        default: false
      feat_brotli_compression:
        description: 'Feature: brotli_compression'
        type: boolean
        default: false
      feat_conduwuit_mods:
        description: 'Feature: conduwuit_mods'
        type: boolean
        default: false
      feat_console:
        description: 'Feature: console'
        type: boolean
        default: true
      feat_default:
        description: 'Feature: default'
        type: boolean
        default: true
      feat_direct_tls:
        description: 'Feature: direct_tls'
        type: boolean
        default: false
      feat_element_hacks:
        description: 'Feature: element_hacks'
        type: boolean
        default: false
      feat_full:
        description: 'Feature: full'
        type: boolean
        default: false
      feat_gzip_compression:
        description: 'Feature: gzip_compression'
        type: boolean
        default: false
      feat_hardened_malloc:
        description: 'Feature: hardened_malloc'
        type: boolean
        default: false
      feat_http3:
        description: 'Feature: http3'
        type: boolean
        default: false
      feat_io_uring:
        description: 'Feature: io_uring'
        type: boolean
        default: false
      feat_jemalloc:
        description: 'Feature: jemalloc'
        type: boolean
        default: false
      feat_jemalloc_conf:
        description: 'Feature: jemalloc_conf'
        type: boolean
        default: false
      feat_jemalloc_prof:
        description: 'Feature: jemalloc_prof'
        type: boolean
        default: false
      feat_jemalloc_stats:
        description: 'Feature: jemalloc_stats'
        type: boolean
        default: false
      feat_journald:
        description: 'Feature: journald'
        type: boolean
        default: false
      feat_ldap:
        description: 'Feature: ldap'
        type: boolean
        default: false
      feat_local_profiling:
        description: 'Feature: local_profiling'
        type: boolean
        default: false
      feat_media_thumbnail:
        description: 'Feature: media_thumbnail'
        type: boolean
        default: false
      feat_otlp_telemetry:
        description: 'Feature: otlp_telemetry'
        type: boolean
        default: false
      feat_perf_measurements:
        description: 'Feature: perf_measurements'
        type: boolean
        default: false
      feat_release_max_log_level:
        description: 'Feature: release_max_log_level'
        type: boolean
        default: false
      feat_sentry_telemetry:
        description: 'Feature: sentry_telemetry'
        type: boolean
        default: false
      feat_standard:
        description: 'Feature: standard'
        type: boolean
        default: false
      feat_systemd:
        description: 'Feature: systemd'
        type: boolean
        default: false
      feat_tokio_console:
        description: 'Feature: tokio_console'
        type: boolean
        default: false
      feat_tokio_metrics:
        description: 'Feature: tokio_metrics'
        type: boolean
        default: false
      feat_url_preview:
        description: 'Feature: url_preview'
        type: boolean
        default: true
      feat_zstd_compression:
        description: 'Feature: zstd_compression'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SKIP_CONFIRM: 1

jobs:
  cpu-x86-64-v3:
    if: vars.C10Y_ENABLE_GITHUB_WORKFLOW_BUILD_CPU_HASWELL != ''
    runs-on: ${{ matrix.os }}
    env:
      ROCKSDB_LIB_DIR: /usr/local/lib

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
        profile:
          - release-max-perf

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-tags: true
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            liburing-dev \
            libbz2-dev \
            clang \
            libclang-dev \
            llvm-dev \
            mold

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9

      - name: Setup RocksDB and Jemalloc
        uses: ./.github/actions/setup-prebuilts
        with:
          cache-key: ${{ matrix.os }}
          arch: x86-64-v3

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
        with:
          shared-key: ${{ matrix.os }}-${{ github.job }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
          env-vars: CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS PROFILE JEMALLOC_SYS_WITH_LG_PAGE

      - name: Resolve Configuration
        id: config
        run: |
          PROFILE="${{ inputs.profile || matrix.profile }}"
          FEATURES="bindgen-static,standard"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            F=()
            [ "${{ inputs.feat_bindgen_runtime }}" == "true" ] && F+=("bindgen-runtime")
            [ "${{ inputs.feat_bindgen_static }}" == "true" ] && F+=("bindgen-static")
            [ "${{ inputs.feat_blurhashing }}" == "true" ] && F+=("blurhashing")
            [ "${{ inputs.feat_brotli_compression }}" == "true" ] && F+=("brotli_compression")
            [ "${{ inputs.feat_conduwuit_mods }}" == "true" ] && F+=("conduwuit_mods")
            [ "${{ inputs.feat_console }}" == "true" ] && F+=("console")
            [ "${{ inputs.feat_default }}" == "true" ] && F+=("default")
            [ "${{ inputs.feat_direct_tls }}" == "true" ] && F+=("direct_tls")
            [ "${{ inputs.feat_element_hacks }}" == "true" ] && F+=("element_hacks")
            [ "${{ inputs.feat_full }}" == "true" ] && F+=("full")
            [ "${{ inputs.feat_gzip_compression }}" == "true" ] && F+=("gzip_compression")
            [ "${{ inputs.feat_hardened_malloc }}" == "true" ] && F+=("hardened_malloc")
            [ "${{ inputs.feat_http3 }}" == "true" ] && F+=("http3")
            [ "${{ inputs.feat_io_uring }}" == "true" ] && F+=("io_uring")
            [ "${{ inputs.feat_jemalloc }}" == "true" ] && F+=("jemalloc")
            [ "${{ inputs.feat_jemalloc_conf }}" == "true" ] && F+=("jemalloc_conf")
            [ "${{ inputs.feat_jemalloc_prof }}" == "true" ] && F+=("jemalloc_prof")
            [ "${{ inputs.feat_jemalloc_stats }}" == "true" ] && F+=("jemalloc_stats")
            [ "${{ inputs.feat_journald }}" == "true" ] && F+=("journald")
            [ "${{ inputs.feat_ldap }}" == "true" ] && F+=("ldap")
            [ "${{ inputs.feat_local_profiling }}" == "true" ] && F+=("local_profiling")
            [ "${{ inputs.feat_media_thumbnail }}" == "true" ] && F+=("media_thumbnail")
            [ "${{ inputs.feat_otlp_telemetry }}" == "true" ] && F+=("otlp_telemetry")
            [ "${{ inputs.feat_perf_measurements }}" == "true" ] && F+=("perf_measurements")
            [ "${{ inputs.feat_release_max_log_level }}" == "true" ] && F+=("release_max_log_level")
            [ "${{ inputs.feat_sentry_telemetry }}" == "true" ] && F+=("sentry_telemetry")
            [ "${{ inputs.feat_standard }}" == "true" ] && F+=("standard")
            [ "${{ inputs.feat_systemd }}" == "true" ] && F+=("systemd")
            [ "${{ inputs.feat_tokio_console }}" == "true" ] && F+=("tokio_console")
            [ "${{ inputs.feat_tokio_metrics }}" == "true" ] && F+=("tokio_metrics")
            [ "${{ inputs.feat_url_preview }}" == "true" ] && F+=("url_preview")
            [ "${{ inputs.feat_zstd_compression }}" == "true" ] && F+=("zstd_compression")
            FEATURES=$(IFS=,; echo "${F[*]}")
          fi
          echo "profile=$PROFILE" >> $GITHUB_OUTPUT
          echo "features=$FEATURES" >> $GITHUB_OUTPUT

      - name: Debug checks
        run: echo "RUSTFLAGS=$RUSTFLAGS" && echo "JEMALLOC_OVERRIDE=$JEMALLOC_OVERRIDE" && make vars cpu-info
        env:
          PROFILE: ${{ steps.config.outputs.profile }}
          CONTINUWUITY_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Build
        env:
          PROFILE: ${{ steps.config.outputs.profile }}
          CONTINUWUITY_BRANCH: ${{ github.head_ref || github.ref_name }}
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C target-cpu=x86-64-v3
        run: make build CARGO_FLAGS="--config Cargo.custom.toml --profile ${{ steps.config.outputs.profile }} --features ${{ steps.config.outputs.features }}"

      - name: Sanity check binary
        run: ./target/latest/conduwuit --version && ./target/latest/conduwuit --version-verbose

      - name: Package Assets
        run: |
          mkdir -p release-assets/bin release-assets/lib release-assets/include
          cp target/latest/conduwuit release-assets/bin/
          # Include the static .a library
          cp target/${{ steps.config.outputs.profile }}/libconduwuit.a release-assets/lib/ || cp target/release/libconduwuit.a release-assets/lib/ || true
          tar -czvf conduwuit-x86-64-v3-${{ matrix.os }}.tar.gz -C release-assets .

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: conduwuit-x86-64-v3-${{ matrix.os }}
          path: conduwuit-x86-64-v3-${{ matrix.os }}.tar.gz
          retention-days: 90

      - name: Publish Release
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/'))
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the branch name or tag for the release name
          TAG_NAME="${{ github.ref_name }}"
          [ "${{ github.ref_type }}" != "tag" ] && TAG_NAME="latest-${TAG_NAME}"
          gh release create "$TAG_NAME" \
            --title "Build: ${TAG_NAME}" \
            --notes "Automated build for ${TAG_NAME} (${{ github.sha }})" \
            --prerelease || true
          gh release upload "$TAG_NAME" conduwuit-x86-64-v3-${{ matrix.os }}.tar.gz --clobber

  # NOTE: Currently just for Ubuntu 22/24 microarchitecture optimized builds (avx512 or avx2)
  cpu-x86-64-v4:
    if: vars.C10Y_ENABLE_GITHUB_WORKFLOW_BUILD_CPU_SKYLAKE != ''
    runs-on: ${{ matrix.os }}
    env:
      ROCKSDB_LIB_DIR: /usr/local/lib

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
        profile:
          - release-max-perf

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-tags: true
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            liburing-dev \
            libbz2-dev \
            clang \
            libclang-dev \
            llvm-dev \
            mold

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9

      - name: Detect best CPU target
        id: cpu
        uses: ./.github/actions/get-cpu-target

      - name: Setup RocksDB and Jemalloc
        uses: ./.github/actions/setup-prebuilts
        with:
          cache-key: ${{ matrix.os }}
          arch: x86-64-v4

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
        with:
          shared-key: ${{ matrix.os }}-${{ github.job }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
          env-vars: CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS PROFILE JEMALLOC_SYS_WITH_LG_PAGE

      - name: Resolve Configuration
        id: config
        run: |
          PROFILE="${{ inputs.profile || matrix.profile }}"
          FEATURES="bindgen-static,standard"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            F=()
            [ "${{ inputs.feat_bindgen_runtime }}" == "true" ] && F+=("bindgen-runtime")
            [ "${{ inputs.feat_bindgen_static }}" == "true" ] && F+=("bindgen-static")
            [ "${{ inputs.feat_blurhashing }}" == "true" ] && F+=("blurhashing")
            [ "${{ inputs.feat_brotli_compression }}" == "true" ] && F+=("brotli_compression")
            [ "${{ inputs.feat_conduwuit_mods }}" == "true" ] && F+=("conduwuit_mods")
            [ "${{ inputs.feat_console }}" == "true" ] && F+=("console")
            [ "${{ inputs.feat_default }}" == "true" ] && F+=("default")
            [ "${{ inputs.feat_direct_tls }}" == "true" ] && F+=("direct_tls")
            [ "${{ inputs.feat_element_hacks }}" == "true" ] && F+=("element_hacks")
            [ "${{ inputs.feat_full }}" == "true" ] && F+=("full")
            [ "${{ inputs.feat_gzip_compression }}" == "true" ] && F+=("gzip_compression")
            [ "${{ inputs.feat_hardened_malloc }}" == "true" ] && F+=("hardened_malloc")
            [ "${{ inputs.feat_http3 }}" == "true" ] && F+=("http3")
            [ "${{ inputs.feat_io_uring }}" == "true" ] && F+=("io_uring")
            [ "${{ inputs.feat_jemalloc }}" == "true" ] && F+=("jemalloc")
            [ "${{ inputs.feat_jemalloc_conf }}" == "true" ] && F+=("jemalloc_conf")
            [ "${{ inputs.feat_jemalloc_prof }}" == "true" ] && F+=("jemalloc_prof")
            [ "${{ inputs.feat_jemalloc_stats }}" == "true" ] && F+=("jemalloc_stats")
            [ "${{ inputs.feat_journald }}" == "true" ] && F+=("journald")
            [ "${{ inputs.feat_ldap }}" == "true" ] && F+=("ldap")
            [ "${{ inputs.feat_local_profiling }}" == "true" ] && F+=("local_profiling")
            [ "${{ inputs.feat_media_thumbnail }}" == "true" ] && F+=("media_thumbnail")
            [ "${{ inputs.feat_otlp_telemetry }}" == "true" ] && F+=("otlp_telemetry")
            [ "${{ inputs.feat_perf_measurements }}" == "true" ] && F+=("perf_measurements")
            [ "${{ inputs.feat_release_max_log_level }}" == "true" ] && F+=("release_max_log_level")
            [ "${{ inputs.feat_sentry_telemetry }}" == "true" ] && F+=("sentry_telemetry")
            [ "${{ inputs.feat_standard }}" == "true" ] && F+=("standard")
            [ "${{ inputs.feat_systemd }}" == "true" ] && F+=("systemd")
            [ "${{ inputs.feat_tokio_console }}" == "true" ] && F+=("tokio_console")
            [ "${{ inputs.feat_tokio_metrics }}" == "true" ] && F+=("tokio_metrics")
            [ "${{ inputs.feat_url_preview }}" == "true" ] && F+=("url_preview")
            [ "${{ inputs.feat_zstd_compression }}" == "true" ] && F+=("zstd_compression")
            FEATURES=$(IFS=,; echo "${F[*]}")
          fi
          echo "profile=$PROFILE" >> $GITHUB_OUTPUT
          echo "features=$FEATURES" >> $GITHUB_OUTPUT

      - name: Debug checks
        run: echo "RUSTFLAGS=$RUSTFLAGS" && echo "JEMALLOC_OVERRIDE=$JEMALLOC_OVERRIDE" && make vars cpu-info
        env:
          PROFILE: ${{ steps.config.outputs.profile }}
          CONTINUWUITY_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Build (${{ steps.cpu.outputs.target }})
        env:
          PROFILE: ${{ steps.config.outputs.profile }}
          CONTINUWUITY_BRANCH: ${{ github.head_ref || github.ref_name }}
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C target-cpu=x86-64-v4
        run: make build CARGO_FLAGS="--config Cargo.custom.toml --profile ${{ steps.config.outputs.profile }} --features ${{ steps.config.outputs.features }}"

      - name: Sanity check binary
        continue-on-error: true
        shell: bash
        run: |
          if grep -q "avx512f" /proc/cpuinfo && \
             grep -q "avx512dq" /proc/cpuinfo && \
             grep -q "avx512bw" /proc/cpuinfo && \
             grep -q "avx512vl" /proc/cpuinfo; then
            ./target/latest/conduwuit --version && ./target/latest/conduwuit --version-verbose
          else
            echo "Skipping binary sanity check: CPU does not support all required AVX-512 flags (F, DQ, BW, VL)."
            echo "This is expected on most GitHub Actions runners for x86-64-v4 builds."
          fi

      - name: Package Assets
        run: |
          mkdir -p release-assets/bin release-assets/lib release-assets/include
          cp target/latest/conduwuit release-assets/bin/
          # Include the static .a library
          cp target/${{ steps.config.outputs.profile }}/libconduwuit.a release-assets/lib/ || cp target/release/libconduwuit.a release-assets/lib/ || true
          tar -czvf conduwuit-x86-64-v4-${{ matrix.os }}.tar.gz -C release-assets .

      - name: Upload binary (${{ steps.cpu.outputs.target }})
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: conduwuit-x86-64-v4-${{ matrix.os }}
          path: conduwuit-x86-64-v4-${{ matrix.os }}.tar.gz
          retention-days: 60

      - name: Publish Release
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/'))
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the branch name or tag for the release name
          TAG_NAME="${{ github.ref_name }}"
          [ "${{ github.ref_type }}" != "tag" ] && TAG_NAME="latest-${TAG_NAME}"
          gh release create "$TAG_NAME" \
            --title "Build: ${TAG_NAME}" \
            --notes "Automated build for ${TAG_NAME} (${{ github.sha }})" \
            --prerelease || true
          gh release upload "$TAG_NAME" conduwuit-x86-64-v4-${{ matrix.os }}.tar.gz --clobber

  # NOTE: Max performance build targeting ARM64 (specifically Raspberry Pi 5 / Cortex-A76)
  # configured for 16K page sizes via a 64K jemalloc override.
  cpu-arm64-cortex-a76:
    if: github.ref == 'refs/heads/main' && vars.C10Y_ENABLE_GITHUB_WORKFLOW_BUILD_CPU_ARM64_PI5 != ''
    runs-on: ${{ matrix.os }}-arm
    env:
      # 16 = 64K page size. Safely covers Pi 5's 16K pages while remaining compatible.
      JEMALLOC_SYS_WITH_LG_PAGE: 16
      ROCKSDB_LIB_DIR: /usr/local/lib

    # Ubuntu 22.04 uses glibc 2.35 (compatible)
    # Raspberry Pi uses glibc 2.36
    # Ubuntu 24.04 uses glibc 2.39 (compatible only with glibc upgrade on Pi 5)
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
        profile:
          - release-max-perf

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
