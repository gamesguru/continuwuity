---
name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SKIP_CONFIRM: 1

jobs:
  clippy-checks:
    # NOTE: to enable GitHub builds/workflows, add a REPOSITORY_VARIABLE
    # i.e., under /settings/variables/actions, C10Y_SOME_ENV_VAR=1
    if: vars.C10Y_ENABLE_GITHUB_WORKFLOW_PR_CHECKS_CLIPPY_CHECKS != ''
    runs-on: ubuntu-24.04
    env:
      PROFILE: dev-quick

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-tags: true
          fetch-depth: 0

      - name: Fetch tags and origin/main for comparison
        run: git fetch --tags --force && git fetch origin HEAD && git log -1 --format="%an (%ad) %H" origin/main -- tests/test_results/complement/test_results.jsonl

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            liburing-dev \
            libbz2-dev \
            clang \
            libclang-dev \
            llvm-dev \
            mold \
            gdb

      - name: Setup sccache
        if: vars.C10Y_ENABLE_SCCACHE != ''
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
        env:
          GITHUB_STEP_SUMMARY: /dev/null

      - name: Detect best CPU target
        id: cpu
        uses: ./.github/actions/get-cpu-target

      - name: Export CPU target env vars
        run: |
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=-C target-cpu=${{ steps.cpu.outputs.target }}" | tee -a $GITHUB_ENV

      - name: Setup RocksDB and Jemalloc
        uses: ./.github/actions/setup-prebuilts
        with:
          cache-key: ubuntu-24.04
          arch: ${{ steps.cpu.outputs.target }}

      - name: Install Rust toolchain
        run: rustup show && rustup component add clippy rustfmt

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt --component clippy

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Debug Environment & Prebuilts
        run: |
          echo "--- Downloaded Prebuilts Info ---"
          for lib in librocksdb libjemalloc liblz4 libzstd; do
            echo ">> $lib"
            LIB_PATH=$(ls /usr/local/lib/$lib.so* 2>/dev/null | head -n 1 || true)
            if [ -z "$LIB_PATH" ]; then
              echo "Library not found: $lib"
              continue
            fi
            file "$LIB_PATH" || true
            nm -D "$LIB_PATH" | grep " T " | head -n 5 || true
            echo "Max GLIBC version required: $(readelf -V "$LIB_PATH" 2>/dev/null | grep -o 'GLIBC_[0-9.]*' | sort -V | tail -n1 || echo 'N/A')"
          done
          echo "--- Runner Info ---"
          ldd --version | head -n 1 || true
          FLAGS=$(grep -m1 '^flags' /proc/cpuinfo || echo "")
          echo "Model: $(grep -m1 'model name' /proc/cpuinfo || echo 'unknown')"
          echo "v4 Support (AVX512F,BW,CD,DQ,VL): $(if echo "$FLAGS" | grep -qw avx512f && echo "$FLAGS" | grep -qw avx512bw && echo "$FLAGS" | grep -qw avx512cd && echo "$FLAGS" | grep -qw avx512dq && echo "$FLAGS" | grep -qw avx512vl; then echo 'YES'; else echo 'NO'; fi)"
          echo "v3 Support (AVX2,BMI1,BMI2,FMA,MOVBE): $(if echo "$FLAGS" | grep -qw avx2 && echo "$FLAGS" | grep -qw bmi1 && echo "$FLAGS" | grep -qw bmi2 && echo "$FLAGS" | grep -qw fma && echo "$FLAGS" | grep -qw movbe; then echo 'YES'; else echo 'NO'; fi)"
          echo "v2 Support (SSE4.2,SSSE3,POPCNT): $(if echo "$FLAGS" | grep -qw sse4_2 && echo "$FLAGS" | grep -qw ssse3 && echo "$FLAGS" | grep -qw popcnt; then echo 'YES'; else echo 'NO'; fi)"
          echo "--- Build Environment ---"
      - name: Format
        run: make format

      - name: Test
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold -C link-arg=-Wl,-rpath,/usr/local/lib -C target-cpu=${{ steps.cpu.outputs.target }}
        run: make test

      - name: DNS Integration Test (Respects /etc/hosts)
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold -C link-arg=-Wl,-rpath,/usr/local/lib -C target-cpu=${{ steps.cpu.outputs.target }}
          CONDUWUIT_TEST_DNS_HOST: conduwuit.test
        run: |
          echo "127.0.0.1 conduwuit.test" | sudo tee -a /etc/hosts
          cargo test --quiet --package conduwuit_service --lib resolver::tests::test_dns_resolution_integration

      - name: Lint
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold -C link-arg=-Wl,-rpath,/usr/local/lib -C target-cpu=${{ steps.cpu.outputs.target }}
        run: make lint
