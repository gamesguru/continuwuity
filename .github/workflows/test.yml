---
name: PR Checks

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SKIP_CONFIRM: 1

jobs:
  clippy-checks:
    # NOTE: to enable GitHub builds/workflows, add a REPOSITORY_VARIABLE
    # i.e., under /settings/variables/actions, C10Y_SOME_ENV_VAR=1
    if: vars.C10Y_ENABLE_GITHUB_WORKFLOW_PR_CHECKS_CLIPPY_CHECKS != ''
    runs-on: ubuntu-24.04
    env:
      PROFILE: dev-quick

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-tags: true
          fetch-depth: 0

      - name: Fetch tags and origin/main for comparison
        run: git fetch --tags --force && git fetch origin HEAD && git log -1 --format="%an (%ad) %H" origin/main -- tests/test_results/complement/test_results.jsonl

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            liburing-dev \
            libbz2-dev \
            clang \
            libclang-dev \
            llvm-dev \
            mold

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Detect best CPU target
        id: cpu
        uses: ./.github/actions/get-cpu-target

      - name: Setup RocksDB and Jemalloc
        uses: ./.github/actions/setup-prebuilts
        with:
          cache-key: ubuntu-24.04
          arch: ${{ steps.cpu.outputs.target }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.90.0"
          components: clippy, rustfmt

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt --component clippy

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Debug checks
        run: echo "RUSTFLAGS=$RUSTFLAGS" && echo "JEMALLOC_OVERRIDE=$JEMALLOC_OVERRIDE" && make vars doctor cpu-info
      - name: Format
        run: make format

      - name: Test
        run: make test

      - name: DNS Integration Test (Respects /etc/hosts)
        env:
          CONDUWUIT_TEST_DNS_HOST: conduwuit.test
        run: |
          echo "127.0.0.1 conduwuit.test" | sudo tee -a /etc/hosts
          cargo test --quiet --package conduwuit_service --lib resolver::tests::test_dns_resolution_integration

      - name: Lint
        run: make lint
