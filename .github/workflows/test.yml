---
name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SKIP_CONFIRM: 1

jobs:
  clippy-checks:
    # NOTE: to enable GitHub builds/workflows, add a REPOSITORY_VARIABLE
    # i.e., under /settings/variables/actions, C10Y_SOME_ENV_VAR=1
    if: vars.C10Y_ENABLE_GITHUB_WORKFLOW_PR_CHECKS_CLIPPY_CHECKS != ''
    runs-on: ubuntu-24.04
    env:
      PROFILE: dev-quick
      ROCKSDB_LIB_DIR: /usr/local/lib
      LD_LIBRARY_PATH: /usr/local/lib

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-tags: true
          fetch-depth: 0

      - name: Fetch tags manually
        run: git fetch --tags --force

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            liburing-dev \
            clang \
            libclang-dev \
            llvm-dev

      - name: Cache RocksDB
        id: rocksdb-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/librocksdb*
          key: rocksdb-10.5.1-ubuntu-24.04

      - name: Build RocksDB 10.5.1
        if: steps.rocksdb-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v10.5.1 https://github.com/facebook/rocksdb /tmp/rocksdb
          cd /tmp/rocksdb
          make shared_lib -j$(nproc)
          sudo make install-shared PREFIX=/usr/local
          sudo ldconfig

      - name: Install RocksDB from cache
        if: steps.rocksdb-cache.outputs.cache-hit == 'true'
        run: sudo ldconfig

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.90.0"
          components: clippy, rustfmt

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt --component clippy

      - name: Install pre-commit
        run: pip install pre-commit

      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          env-vars: PROFILE

      - name: Debug checks
        run: make vars doctor cpu-info
      - name: Format
        run: make format

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
  # Complement tests (AMD64)
  # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
  complement-tests:
    # NOTE: to enable GitHub builds/workflows, add a REPOSITORY_VARIABLE
    # i.e., under /settings/variables/actions, C10Y_SOME_ENV_VAR=1
    if: vars.C10Y_ENABLE_GITHUB_WORKFLOW_PR_CHECKS_COMPLEMENT_TESTS != ''
    runs-on: ${{ matrix.os }}
    env:
      PROFILE: release
      FEATURES: "direct_tls"
      ROCKSDB_LIB_DIR: /usr/local/lib
      LD_LIBRARY_PATH: /usr/local/lib

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-22.04
          - arch: amd64
            os: ubuntu-24.04

    # For writing/updating PR comments on running test totals (# pass/fail/skip)
    # and pushing the generated github-badge.json to the badges branch
    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-tags: true
          fetch-depth: 0

      - name: Fetch tags manually
        run: git fetch --tags --force

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            liburing-dev \
            clang \
            libclang-dev \
            llvm-dev

      - name: Cache RocksDB
        id: rocksdb-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/librocksdb*
          key: rocksdb-10.5.1-${{ matrix.os }}

      - name: Build RocksDB 10.5.1
        if: steps.rocksdb-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v10.5.1 https://github.com/facebook/rocksdb /tmp/rocksdb
          cd /tmp/rocksdb
          make shared_lib -j$(nproc)
          sudo make install-shared PREFIX=/usr/local
          sudo ldconfig

      - name: Install RocksDB from cache
        if: steps.rocksdb-cache.outputs.cache-hit == 'true'
        run: sudo ldconfig

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.90.0"

      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          env-vars: CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS PROFILE JEMALLOC_SYS_WITH_LG_PAGE

      - name: Build conduwuit for Complement
        env:
          CONTINUWUITY_BRANCH: ${{ github.head_ref || github.ref_name }}
          # The Raspberry Pi 5 uses a Cortex-A76 CPU. Setting this maximizes performance.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: ${{ matrix.arch == 'arm64' && '-C target-cpu=cortex-a76' || '' }}
        run: SKIP_CONFIRM=1 make build PROFILE=${{ env.PROFILE }} CARGO_FLAGS="--profile ${{ env.PROFILE }} --features direct_tls"

      - name: Import GPG key
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.C10Y_BINARY_RELEASE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.C10Y_BINARY_RELEASE_GPG_PRIVATE_KEY_PASSWORD }}

      - name: Sign binary
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: gpg --batch --yes --detach-sign --armor target/latest/conduwuit

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: conduwuit-${{ env.PROFILE }}-direct_tls-${{ matrix.os }}
          path: |
            target/latest/conduwuit
            target/latest/conduwuit.asc
          retention-days: 60

      - name: Checkout Complement
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: matrix-org/complement
          path: complement-src

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: complement-src/go.sum

      - name: Build Complement Docker image
        run: DOCKER_BUILDKIT=1 docker buildx build --build-arg BINARY_PATH=target/latest/conduwuit -t continuwuity:complement -f ./docker/complement.Dockerfile --load .

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Capture baseline stats
        run: VERBOSE=1 make complement/stats | tee baseline_stats.txt

      - name: Build and run Complement tests
        run: |
          ./bin/complement ./complement-src

      - name: Compare results with baseline
        continue-on-error: true
        run: diff --color=always -u baseline_stats.txt <(VERBOSE=1 make complement/stats)

      - name: Upload test logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: complement-logs-${{ matrix.os }}
          path: tests/test_results/complement/test_results.jsonl
          retention-days: 90

      - name: Parse Complement results
        id: results
        run: |
          RESULTS="tests/test_results/complement/test_results.jsonl"
          PASS=$(jq -s '[.[] | select(.Action == "pass")] | length' "$RESULTS")
          FAIL=$(jq -s '[.[] | select(.Action == "fail")] | length' "$RESULTS")
          SKIP=$(jq -s '[.[] | select(.Action == "skip")] | length' "$RESULTS")
          TOTAL=$((PASS + FAIL + SKIP))
          FAILED_TESTS=$(jq -r 'select(.Action == "fail") | .Test' "$RESULTS" | sort -u)

          echo "pass=$PASS" >> "$GITHUB_OUTPUT"
          echo "fail=$FAIL" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "failed_tests<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FAILED_TESTS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Get conduwuit version
        id: version
        if: always()
        run: |
          VERSION=$(./target/latest/conduwuit --version 2>/dev/null || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Results Ledger
        if: always()
        uses: ./.forgejo/actions/update-results-ledger
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pass_count: ${{ steps.results.outputs.pass || 0 }}
          fail_count: ${{ steps.results.outputs.fail || 0 }}
          skip_count: ${{ steps.results.outputs.skip || 0 }}
          version_string: ${{ steps.version.outputs.version }}
          features: ${{ env.FEATURES }}
          actor: ${{ github.actor }}
          binary_path: target/latest/conduwuit

      - name: Post Complement results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          FAILED_TESTS: ${{ steps.results.outputs.failed_tests }}
        with:
          script: |
            const pass = ${{ steps.results.outputs.pass || 0 }};
            const fail = ${{ steps.results.outputs.fail || 0 }};
            const skip = ${{ steps.results.outputs.skip || 0 }};
            const total = ${{ steps.results.outputs.total || 0 }};
            const arch = '${{ matrix.arch }}';
            const os = '${{ matrix.os }}';
            const failedTestsRaw = process.env.FAILED_TESTS || '';

            const lines = failedTestsRaw.trim().split('\n').filter(l => l.length > 0);
            let failedContent = 'No failing tests recorded.';
            if (lines.length > 0) {
              const list = lines.join('\n');
              failedContent = '```\n' + list + '\n```';
            }

            let currentRun = [
              `## Complement Test Results (${arch} ${os})`,
              `**Commit:** `${context.payload.pull_request.head.ref}` (`${context.payload.pull_request.head.sha.substring(0, 7)}`)`,
              '',
              '| Status | Count |',
              '|--------|-------|',
              `| ✓ Pass | ${pass} |`,
              `| ✗ Fail | ${fail} |`,
              `| ⌒ Skip | ${skip} |`,
              `| **Total** | **${total}** |`,
              '',
              `<details><summary>Failed Tests (${fail})</summary>`,
              '',
              failedContent,
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `<!-- complement-test-results-${arch}-${os} -->`;
            const existing = comments.find(c =>
              c.body && c.body.includes(marker)
            );

            let body = currentRun + '\n\n' + marker;

            if (existing) {
              let oldBody = existing.body.replace(marker, '').replace(`## Complement Test Results (${arch} ${os})`, '').trim();
              if (oldBody.length > 0) {
                const maxPreviousRuns = 6;
                let parts = oldBody.split('<details><summary>Previous Runs</summary>');
                if (parts.length > maxPreviousRuns + 1) {
                  parts = parts.slice(0, maxPreviousRuns + 1);
                  oldBody = parts.join('<details><summary>Previous Runs</summary>');
                  oldBody += '\n\n' + '</details>\n\n'.repeat(maxPreviousRuns).trim();
                }
                body = currentRun + '\n\n<details><summary>Previous Runs</summary>\n\n' + oldBody + '\n\n</details>\n\n' + marker;
              }
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
