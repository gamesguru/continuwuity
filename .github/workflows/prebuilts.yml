---
name: Prebuild

on:
  push:
    branches: [_metadata/prebuilts/github-trigger]
  workflow_dispatch:
    inputs:
      rocksdb_version:
        description: "RocksDB Version Tag"
        required: true
        default: "10.5.1"
      jemalloc_version:
        description: "jemalloc Version Tag"
        required: true
        default: "5.3.0"
      lz4_version:
        description: "lz4 Version Tag"
        required: true
        default: "1.9.4"
      zstd_version:
        description: "zstd Version Tag"
        required: true
        default: "1.5.6"
      release_tag:
        description: "Target GitHub Release Tag"
        required: true
        default: "v0.5"

env:
  ROCKSDB_DEFAULT_VERSION: "10.5.1"
  JEMALLOC_DEFAULT_VERSION: "5.3.0"
  LZ4_DEFAULT_VERSION: "1.9.4"
  ZSTD_DEFAULT_VERSION: "1.5.6"
  DEFAULT_RELEASE_TAG: "v0.5"

jobs:
  check-existing:
    name: Check existing artifacts
    runs-on: ubuntu-24.04
    outputs:
      rocksdb: ${{ steps.check.outputs.rocksdb }}
      jemalloc: ${{ steps.check.outputs.jemalloc }}
      lz4: ${{ steps.check.outputs.lz4 }}
      zstd: ${{ steps.check.outputs.zstd }}
    steps:
      - name: Determine builds needed
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          TAG="${TAG:-$DEFAULT_RELEASE_TAG}"
          EXISTING=$(gh release view "$TAG" --json assets -q ".assets[].name" 2>/dev/null || true)

          check_dep() {
            local dep="$1" version="$2" matrix="[]"
            for arch in x86-64-v2 x86-64-v3 x86-64-v4 arm64-cortex-a76; do
              for os in ubuntu-22.04 ubuntu-24.04; do
                local filename="${dep}-${version}-${arch}-${os}.tar.gz"
                if ! echo "$EXISTING" | grep -qF "$filename"; then
                  matrix=$(echo "$matrix" | jq -c ". + [{\"arch\": \"$arch\", \"os\": \"$os\"}]")
                  echo "-> $filename not found, will build" >&2
                else
                  echo "* $filename exists, skipping" >&2
                fi
              done
            done
            echo "$matrix"
          }

          ROCKSDB_V="${{ github.event.inputs.rocksdb_version }}"
          JEMALLOC_V="${{ github.event.inputs.jemalloc_version }}"
          LZ4_V="${{ github.event.inputs.lz4_version }}"
          ZSTD_V="${{ github.event.inputs.zstd_version }}"

          echo "rocksdb=$(check_dep rocksdb "${ROCKSDB_V:-$ROCKSDB_DEFAULT_VERSION}")" >> "$GITHUB_OUTPUT"
          echo "jemalloc=$(check_dep jemalloc "${JEMALLOC_V:-$JEMALLOC_DEFAULT_VERSION}")" >> "$GITHUB_OUTPUT"
          echo "lz4=$(check_dep lz4 "${LZ4_V:-$LZ4_DEFAULT_VERSION}")" >> "$GITHUB_OUTPUT"
          echo "zstd=$(check_dep zstd "${ZSTD_V:-$ZSTD_DEFAULT_VERSION}")" >> "$GITHUB_OUTPUT"

  build-rocksdb:
    name: Build RocksDB (${{ matrix.arch }}, ${{ matrix.os }})
    needs: [check-existing]
    if: needs.check-existing.outputs.rocksdb != '[]'
    runs-on: ${{ matrix.os }}${{ contains(matrix.arch, 'arm64') && '-arm' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.check-existing.outputs.rocksdb) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config clang libclang-dev llvm-dev cmake autoconf automake libtool wget git curl libbzip2-dev
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | sudo bash -s -- --to /usr/local/bin

      - name: Build
        shell: bash
        run: |
          ARCH="${{ matrix.arch }}"
          if [[ "$ARCH" == "arm64-cortex-a76" ]]; then
            EXTRA_FLAGS="-march=armv8.2-a+crc"
          elif [[ "$ARCH" == x86-64-v* ]]; then
            EXTRA_FLAGS="-march=$ARCH -mpclmul"
          else
            EXTRA_FLAGS="-march=$ARCH"
          fi
          export EXTRA_CFLAGS="$EXTRA_FLAGS"
          export EXTRA_CXXFLAGS="$EXTRA_FLAGS"
          export CFLAGS="$EXTRA_FLAGS"
          export CXXFLAGS="$EXTRA_FLAGS"

          sudo just init-prebuild
          just prebuild-rocksdb
          just install-rocksdb

          cd /usr/local
          VERSION="${{ github.event.inputs.rocksdb_version }}"
          VERSION="${VERSION:-$ROCKSDB_DEFAULT_VERSION}"
          TAR_FILENAME="rocksdb-${VERSION}-${{ matrix.arch }}-${{ matrix.os }}.tar.gz"
          sudo tar -czvf "$GITHUB_WORKSPACE/$TAR_FILENAME" include/rocksdb lib/librocksdb*

      - name: Upload Artifact Storage
        uses: actions/upload-artifact@v4
        with:
          name: rocksdb_${{ matrix.arch }}_${{ matrix.os }}
          path: "*.tar.gz"
          retention-days: 1

  build-jemalloc:
    name: Build jemalloc (${{ matrix.arch }}, ${{ matrix.os }})
    needs: [check-existing]
    if: needs.check-existing.outputs.jemalloc != '[]'
    runs-on: ${{ matrix.os }}${{ contains(matrix.arch, 'arm64') && '-arm' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.check-existing.outputs.jemalloc) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config clang libclang-dev llvm-dev cmake autoconf automake libtool wget git curl libbzip2-dev
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | sudo bash -s -- --to /usr/local/bin

      - name: Build
        shell: bash
        run: |
          ARCH="${{ matrix.arch }}"
          if [[ "$ARCH" == "arm64-cortex-a76" ]]; then
            EXTRA_FLAGS="-march=armv8.2-a+crc"
          elif [[ "$ARCH" == x86-64-v* ]]; then
            EXTRA_FLAGS="-march=$ARCH -mpclmul"
          else
            EXTRA_FLAGS="-march=$ARCH"
          fi
          export EXTRA_CFLAGS="$EXTRA_FLAGS"
          export EXTRA_CXXFLAGS="$EXTRA_FLAGS"
          export CFLAGS="$EXTRA_FLAGS"
          export CXXFLAGS="$EXTRA_FLAGS"

          sudo just init-prebuild
          just prebuild-jemalloc
          just install-jemalloc

          cd /usr/local
          VERSION="${{ github.event.inputs.jemalloc_version }}"
          VERSION="${VERSION:-$JEMALLOC_DEFAULT_VERSION}"
          TAR_FILENAME="jemalloc-${VERSION}-${{ matrix.arch }}-${{ matrix.os }}.tar.gz"
          sudo tar -czvf "$GITHUB_WORKSPACE/$TAR_FILENAME" include/jemalloc lib/libjemalloc*

      - name: Upload Artifact Storage
        uses: actions/upload-artifact@v4
        with:
          name: jemalloc_${{ matrix.arch }}_${{ matrix.os }}
          path: "*.tar.gz"
          retention-days: 1

  build-lz4:
    name: Build lz4 (${{ matrix.arch }}, ${{ matrix.os }})
    needs: [check-existing]
    if: needs.check-existing.outputs.lz4 != '[]'
    runs-on: ${{ matrix.os }}${{ contains(matrix.arch, 'arm64') && '-arm' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.check-existing.outputs.lz4) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config clang libclang-dev llvm-dev cmake autoconf automake libtool wget git curl libbzip2-dev
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | sudo bash -s -- --to /usr/local/bin

      - name: Build
        shell: bash
        run: |
          ARCH="${{ matrix.arch }}"
          if [[ "$ARCH" == "arm64-cortex-a76" ]]; then
            EXTRA_FLAGS="-march=armv8.2-a+crc"
          elif [[ "$ARCH" == x86-64-v* ]]; then
            EXTRA_FLAGS="-march=$ARCH -mpclmul"
          else
            EXTRA_FLAGS="-march=$ARCH"
          fi
          export EXTRA_CFLAGS="$EXTRA_FLAGS"
          export EXTRA_CXXFLAGS="$EXTRA_FLAGS"
          export CFLAGS="$EXTRA_FLAGS"
          export CXXFLAGS="$EXTRA_FLAGS"

          sudo just init-prebuild
          just prebuild-lz4
          just install-lz4

          cd /usr/local
          VERSION="${{ github.event.inputs.lz4_version }}"
          VERSION="${VERSION:-$LZ4_DEFAULT_VERSION}"
          TAR_FILENAME="lz4-${VERSION}-${{ matrix.arch }}-${{ matrix.os }}.tar.gz"
          sudo tar -czvf "$GITHUB_WORKSPACE/$TAR_FILENAME" include/lz4* lib/liblz4*

      - name: Upload Artifact Storage
        uses: actions/upload-artifact@v4
        with:
          name: lz4_${{ matrix.arch }}_${{ matrix.os }}
          path: "*.tar.gz"
          retention-days: 1

  build-zstd:
    name: Build zstd (${{ matrix.arch }}, ${{ matrix.os }})
    needs: [check-existing]
    if: needs.check-existing.outputs.zstd != '[]'
    runs-on: ${{ matrix.os }}${{ contains(matrix.arch, 'arm64') && '-arm' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.check-existing.outputs.zstd) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config clang libclang-dev llvm-dev cmake autoconf automake libtool wget git curl libbzip2-dev
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | sudo bash -s -- --to /usr/local/bin

      - name: Build
        shell: bash
        run: |
          ARCH="${{ matrix.arch }}"
          if [[ "$ARCH" == "arm64-cortex-a76" ]]; then
            EXTRA_FLAGS="-march=armv8.2-a+crc"
          elif [[ "$ARCH" == x86-64-v* ]]; then
            EXTRA_FLAGS="-march=$ARCH -mpclmul"
          else
            EXTRA_FLAGS="-march=$ARCH"
          fi
          export EXTRA_CFLAGS="$EXTRA_FLAGS"
          export EXTRA_CXXFLAGS="$EXTRA_FLAGS"
          export CFLAGS="$EXTRA_FLAGS"
          export CXXFLAGS="$EXTRA_FLAGS"

          sudo just init-prebuild
          just prebuild-zstd
          just install-zstd

          cd /usr/local
          VERSION="${{ github.event.inputs.zstd_version }}"
          VERSION="${VERSION:-$ZSTD_DEFAULT_VERSION}"
          TAR_FILENAME="zstd-${VERSION}-${{ matrix.arch }}-${{ matrix.os }}.tar.gz"
          sudo tar -czvf "$GITHUB_WORKSPACE/$TAR_FILENAME" include/zstd* lib/libzstd*

      - name: Upload Artifact Storage
        uses: actions/upload-artifact@v4
        with:
          name: zstd_${{ matrix.arch }}_${{ matrix.os }}
          path: "*.tar.gz"
          retention-days: 1

  publish:
    name: Publish
    needs: [check-existing, build-rocksdb, build-jemalloc, build-lz4, build-zstd]
    if: "!cancelled()"
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: prebuilts_download
          merge-multiple: true

      - name: Create/Upload Release Artifact
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Providing context for creating the release
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          RELEASE_TAG="${RELEASE_TAG:-$DEFAULT_RELEASE_TAG}"
          TAG="$RELEASE_TAG"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "Prebuilts $RELEASE_TAG" --notes "Automated pre-built libraries for CI" || true
          fi

          if [ ! -d prebuilts_download ] || ! ls prebuilts_download/*.tar.gz 1>/dev/null 2>&1; then
            echo "No new artifacts to upload, all builds were skipped."
            exit 0
          fi

          cd prebuilts_download
          echo "Uploading all prebuilt artifacts..."
          for file in *.tar.gz; do
            echo "Uploading $file..."
            for i in {1..5}; do
              if gh release upload "$TAG" "$file" --clobber; then
                echo "Successfully uploaded $file"
                break
              fi
              echo "Upload failed for $file, retrying in 10s..."
              sleep 10
              if [ "$i" -eq 5 ]; then
                echo "Error: Failed to upload $file after 5 attempts."
                exit 1
              fi
            done
          done
          echo "All artifacts uploaded successfully."
