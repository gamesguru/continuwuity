---
name: Build Prebuilts (RocksDB)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Library version tag"
        required: true
        default: "10.5.1"
      release_tag:
        description: "Target GitHub Release Tag"
        required: true
        default: "v0.5"

jobs:
  build-rocksdb:
    name: Build RocksDB (${{ matrix.arch }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}${{ contains(matrix.arch, 'arm64') && '-arm' || '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        arch: [x86-64-v3, x86-64-v4, arm64-cortex-a76]

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            clang \
            libclang-dev \
            llvm-dev \
            cmake \
            autoconf \
            automake \
            libtool \
            wget \
            git

      - name: Build RocksDB
        shell: bash
        run: |
          STAGING_DIR="$(pwd)/prebuilts"
          mkdir -p "$STAGING_DIR/include" "$STAGING_DIR/lib"
          export PREFIX="$STAGING_DIR"
          export PKG_CONFIG_PATH="$STAGING_DIR/lib/pkgconfig:$PKG_CONFIG_PATH"
          export CFLAGS="-fPIC -I$STAGING_DIR/include"
          export CXXFLAGS="-fPIC -I$STAGING_DIR/include"
          export LDFLAGS="-L$STAGING_DIR/lib"

          ARCH="${{ matrix.arch }}"
          if [[ "$ARCH" == "arm64-cortex-a76" ]]; then
            EXTRA_FLAGS="-march=armv8.2-a+crc"
          elif [[ "$ARCH" == x86-64-v* ]]; then
            EXTRA_FLAGS="-march=$ARCH -mpclmul"
          else
            EXTRA_FLAGS="-march=$ARCH"
          fi

          export EXTRA_CFLAGS="-Wno-error=unused-parameter $EXTRA_FLAGS"
          export EXTRA_CXXFLAGS="-Wno-error=unused-parameter $EXTRA_FLAGS"
          export DISABLE_JEMALLOC=1

          cd /tmp
          git clone --recursive https://github.com/zaidoon1/rust-rocksdb.git rust-rocksdb
          cd rust-rocksdb/librocksdb-sys/rocksdb

          make shared_lib static_lib -j$(nproc)
          make install-shared PREFIX="$STAGING_DIR"
          make install-static PREFIX="$STAGING_DIR"

          cd "$STAGING_DIR"
          TAR_FILENAME="rocksdb-${{ github.event.inputs.version }}-${{ matrix.arch }}-${{ matrix.os }}.tar.gz"
          tar -czvf "../$TAR_FILENAME" .

      - name: Create/Upload Release Artifact
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          FILENAME="rocksdb-${{ github.event.inputs.version }}-${{ matrix.arch }}-${{ matrix.os }}.tar.gz"

          sleep $(( RANDOM % 30 ))

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "Prebuilts ${{ github.event.inputs.release_tag }}" --notes "Automated pre-built libraries for CI" || true
          fi

          for i in {1..5}; do
            echo "Upload attempt $i..."
            if gh release upload "$TAG" "../$FILENAME" --clobber; then
              echo "Upload successful."
              break
            fi
            echo "Upload failed, retrying in 10s..."
            sleep 10
          done
