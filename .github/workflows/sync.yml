name: Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  main:
    if: vars.C10Y_ENABLE_GITHUB_WORKFLOW_SYNC_MAIN != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://forgejo.ellis.link/continuwuation/continuwuity.git
          git fetch upstream main
          git merge upstream/main --no-edit || exit 1
          git push origin main

  metadata:
    if: vars.C10Y_ENABLE_GITHUB_WORKFLOW_SYNC_METADATA != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://forgejo.ellis.link/continuwuation/continuwuity.git
          git fetch upstream _metadata/badges:upstream_metadata || true
          git checkout _metadata/badges || git checkout -b _metadata/badges
          git merge upstream_metadata --no-edit || exit 1
          git push origin _metadata/badges

  forge-head:
    if: vars.C10Y_ENABLE_GITHUB_WORKFLOW_SYNC_FORGE_HEAD != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://forgejo.ellis.link/continuwuation/continuwuity.git
          git fetch upstream main:upstream_main
          git checkout _metadata/forge.ellis.link/HEAD || git checkout -b _metadata/forge.ellis.link/HEAD
          git reset --hard upstream_main
          git push origin _metadata/forge.ellis.link/HEAD --force
