name: Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - name: Slim Checkout
        shell: bash
        run: |
          git clone --depth 1 ${{ github.server_url }}/${{ github.repository }}.git .
          git fetch --unshallow || true

      - name: Configure Git
        run: |
          git config user.name "continuwuity CI"
          git config user.email "noreply@continuwuity.org"
          git config checkout.defaultRemote origin
          git config commit.gpgsign true
          git remote add upstream https://forgejo.ellis.link/gamesguru/continuwuity.git

      - name: Sync main
        run: |
          if git fetch upstream main; then
            git fetch origin main || true
            if git show-ref --verify --quiet refs/remotes/origin/main; then
              git checkout -B main origin/main
              git merge FETCH_HEAD --no-edit || exit 1
            else
              git checkout -b main FETCH_HEAD
            fi
            git push origin main
          else
            echo "Failed to fetch upstream main."
            exit 1
          fi

      - name: Sync dev
        run: |
          if git fetch upstream dev; then
            git fetch origin dev || true
            if git show-ref --verify --quiet refs/remotes/origin/dev; then
              git checkout -B dev origin/dev
              git merge FETCH_HEAD --no-edit || exit 1
            else
              git checkout -b dev FETCH_HEAD
            fi
            git push origin dev
          else
            echo "Failed to fetch upstream dev."
            exit 1
          fi

      - name: Sync metadata
        run: |
          if git fetch upstream _metadata/badges; then
            git fetch origin _metadata/badges || true
            if git show-ref --verify --quiet refs/remotes/origin/_metadata/badges; then
              git checkout -B _metadata/badges origin/_metadata/badges
              git merge FETCH_HEAD --no-edit --allow-unrelated-histories || exit 1
            else
              git checkout -b _metadata/badges FETCH_HEAD
            fi
            git push origin _metadata/badges
          else
            echo "Upstream _metadata/badges not found, skipping."
          fi

      - name: Sync forge-head
        run: |
          if git fetch upstream main; then
            git checkout -B _metadata/forge.ellis.link/HEAD FETCH_HEAD
            git push origin _metadata/forge.ellis.link/HEAD --force
          else
            echo "Failed to fetch upstream main for forge-head."
            exit 1
          fi
