---
name: Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SKIP_CONFIRM: 1

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Slim Checkout
        shell: bash
        run: |
          git clone --depth 1 ${{ github.server_url }}/${{ github.repository }}.git .tmp_repo
          # Move files to root but keep a stable copy of the sync action
          mkdir -p .github/actions/git-sync
          cp .tmp_repo/.github/actions/git-sync/action.yml .github/actions/git-sync/
          mv .tmp_repo/* .tmp_repo/.* . 2>/dev/null || true
          rm -rf .tmp_repo
          git fetch --unshallow || true

      - name: Configure Git
        env:
          TOKEN: ${{ github.token }}
          GPG_PASSPHRASE: ${{ secrets.C10Y_BINARY_RELEASE_GPG_PRIVATE_KEY_PASSWORD }}
        run: |
          git config user.name "continuwuity CI"
          git config user.email "noreply@continuwuity.org"
          git config checkout.defaultRemote origin
          git config commit.gpgsign true
          if [ -n "$GPG_PASSPHRASE" ]; then
            git config gpg.program "gpg --batch --pinentry-mode loopback --passphrase $GPG_PASSPHRASE"
          fi

          # Re-configure origin with token for authenticated push
          SERVER_URL="${{ github.server_url }}"
          HOST="${SERVER_URL#https://}"
          git remote set-url origin https://x-access-token:$TOKEN@$HOST/${{ github.repository }}.git

          git remote add upstream https://forgejo.ellis.link/gamesguru/continuwuity.git
          git remote add ellis https://github.com/continuwuity/continuwuity.git

      - name: Sync main (from ellis)
        uses: ./.github/actions/git-sync
        with:
          branch: main
          source_remote: ellis
          dest_remote: origin

      - name: Sync main (from forge)
        uses: ./.github/actions/git-sync
        with:
          branch: main
          source_remote: upstream
          dest_remote: origin

      - name: Sync main (to forge)
        uses: ./.github/actions/git-sync
        with:
          branch: main
          source_remote: origin
          dest_remote: upstream

      - name: Sync dev (from forge)
        uses: ./.github/actions/git-sync
        with:
          branch: dev
          source_remote: upstream
          dest_remote: origin

      - name: Sync dev (to forge)
        uses: ./.github/actions/git-sync
        with:
          branch: dev
          source_remote: origin
          dest_remote: upstream

      - name: Sync metadata
        uses: ./.github/actions/git-sync
        with:
          branch: _metadata/badges
          source_remote: upstream
          dest_remote: origin
          allow_unrelated: "true"

      - name: Sync forge-head
        uses: ./.github/actions/git-sync
        with:
          branch: main
          dest_branch: _metadata/forge.ellis.link/HEAD
          source_remote: upstream
          dest_remote: origin
          mode: force
