name: Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://forgejo.ellis.link/gamesguru/continuwuity.git

          if git fetch upstream main:upstream_main; then
            git checkout main
            git merge upstream_main --no-edit || exit 1
            git push origin main
          else
            echo "Failed to fetch upstream main."
            exit 1
          fi

  metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://forgejo.ellis.link/gamesguru/continuwuity.git

          # Fetch upstream metadata branch
          if git fetch upstream _metadata/badges:upstream_metadata; then
            # If local branch doesn't exist, create it from upstream
            if ! git show-ref --verify --quiet refs/heads/_metadata/badges; then
              git checkout -b _metadata/badges upstream_metadata
            else
              git checkout _metadata/badges
              git merge upstream_metadata --no-edit || exit 1
            fi
            git push origin _metadata/badges
          else
            echo "Upstream _metadata/badges not found, skipping."
          fi

  forge-head:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://forgejo.ellis.link/gamesguru/continuwuity.git

          if git fetch upstream main:upstream_main; then
            git checkout -B _metadata/forge.ellis.link/HEAD upstream_main
            git push origin _metadata/forge.ellis.link/HEAD --force
          else
            echo "Failed to fetch upstream main."
            exit 1
          fi
