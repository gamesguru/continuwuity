ruma = { git = "https://forgejo.ellis.link/continuwuation/ruwuma", rev = "d00b51a8669b21689c4eb47fb81f3a8b27c3e371", features = ["unstable-pdu"] }
ruma-lean = "0.1.3"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
